function scheduleMeetingSubmit() {
    const title = document.getElementById('meetingTitle').value;
    const type = document.getElementById('meetingType').value;
    const date = document.getElementById('meetingDate').value;
    const startTime = document.getElementById('meetingStartTime').value;
    const endTime = document.getElementById('meetingEndTime').value;
    const location = document.getElementById('meetingLocation').value;
    const department = document.getElementById('meetingDepartment').value;
    const attendeeCount = document.getElementById('attendeeCount').value;
    const description = document.getElementById('meetingDescription').value;
    
    // Get checked resources
    const resources = [];
    if (document.getElementById('projector').checked) resources.push('Projector');
    if (document.getElementById('whiteboard').checked) resources.push('Whiteboard');
    if (document.getElementById('refreshments').checked) resources.push('Refreshments');
    if (document.getElementById('parking').checked) resources.push('Parking');
    
    if (!title || !type || !date || !startTime || !endTime || !location || !department) {
        alert('Please fill all required fields');
        return;
    }
    
    const meeting = {
        id: 'MTG-' + Date.now(),
        title: title,
        type: type,
        date: date,
        startTime: startTime,
        endTime: endTime,
        location: location,
        department: department,
        attendeeCount: attendeeCount,
        description: description,
        resources: resources,
        scheduledBy: 'Admin Assistant',
        scheduledDate: new Date().toISOString(),
        status: 'scheduled'
    };
    
    // Save to API
    console.log('Meeting data to be saved to API:', meeting);
    
    // Prepare data for API
    const apiData = {
        meeting_title: meeting.title,
        meeting_type: meeting.type,
        meeting_date: meeting.date,
        start_time: meeting.startTime,
        end_time: meeting.endTime,
        location: meeting.location,
        organizing_department: meeting.department,
        expected_attendees: meeting.attendeeCount,
        meeting_description: meeting.description,
        projector_required: meeting.resources.includes('Projector'),
        whiteboard_required: meeting.resources.includes('Whiteboard'),
        refreshments_required: meeting.resources.includes('Refreshments'),
        parking_required: meeting.resources.includes('Parking'),
        created_by: meeting.scheduledBy
    };
    
    // Send to API - Fixed URL typo (added missing 'n')
    const baseUrl = window.location.origin;
    fetch(`${baseUrl}/api/meetings`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
            'Authorization': `Bearer ${sessionManager.getAuthToken()}`
        },
        body: JSON.stringify(apiData)
    })
    .then(response => {
        console.log('📡 Meeting API Response status:', response.status);
        return response.json();
    })
    .then(data => {
        console.log('📊 Meeting API Response data:', data);
        
        if (data.error) {
            throw new Error(data.error);
        }
        
        alert('Meeting scheduled successfully!\n\n' + title + '\nDate: ' + date + '\nTime: ' + startTime + ' - ' + endTime + '\nLocation: ' + location + '\nResources: ' + resources.join(', '));
        
        // Clear form
        document.getElementById('meetingTitle').value = '';
        document.getElementById('meetingType').value = '';
        document.getElementById('meetingDate').value = '';
        document.getElementById('meetingStartTime').value = '';
        document.getElementById('meetingEndTime').value = '';
        document.getElementById('meetingLocation').value = '';
        document.getElementById('meetingDepartment').value = '';
        document.getElementById('attendeeCount').value = '';
        document.getElementById('meetingDescription').value = '';
        document.getElementById('projector').checked = false;
        document.getElementById('whiteboard').checked = false;
        document.getElementById('refreshments').checked = false;
        document.getElementById('parking').checked = false;
    })
    .catch(error => {
        console.error('❌ Error scheduling meeting:', error);
        alert('Failed to schedule meeting: ' + error.message);
    });
    
    // Refresh meetings list
    scheduleMeeting();
}

// Enhanced Office Portal Functions
function showPortalSection(section) {
    // Hide all sections
    document.querySelectorAll('.portal-section').forEach(sec => {
        sec.style.display = 'none';
    });
    
    // Remove active class from all tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    
    // Show selected section
    const selectedSection = document.getElementById(section + '-section');
    if (selectedSection) {
        selectedSection.style.display = 'block';
    }
    
    // Add active class to clicked tab
    event.target.classList.add('active');
}

function filterPortal(category) {
    console.log('🔍 Filtering portal by category:', category);
    
    const allCards = document.querySelectorAll('.personnel-card, .document-card, .policy-card, .contract-card');
    let visibleCount = 0;
    
    allCards.forEach(card => {
        const cardDepartment = card.dataset.department?.toLowerCase() || '';
        const cardCategory = card.dataset.category?.toLowerCase() || '';
        const cardType = card.dataset.type?.toLowerCase() || '';
        const cardRole = card.dataset.role?.toLowerCase() || '';
        
        // Show all if no category selected
        if (category === '') {
            card.style.display = 'block';
            visibleCount++;
        } 
        // Filter by department/category match
        else if (cardDepartment === category.toLowerCase() || 
                 cardCategory === category.toLowerCase() || 
                 cardType === category.toLowerCase() || 
                 cardRole === category.toLowerCase()) {
            card.style.display = 'block';
            visibleCount++;
        } 
        else {
            card.style.display = 'none';
        }
        
        console.log('🏷️ Card filter check:', {
            department: cardDepartment,
            category: cardCategory,
            type: cardType,
            role: cardRole,
            filter: category,
            visible: card.style.display === 'block'
        });
    });
    
    // Show filter results notification
    const categoryName = category === '' ? 'All Categories' : category.charAt(0).toUpperCase() + category.slice(1);
    showNotification('Filter Applied', `Showing ${visibleCount} items in ${categoryName}`, 'info');
}

        'agreement': '📋',
        'id': '🆔',
        'contract': '📝'
    };

function viewFile(personId, fileType, fileName) {
    const user = window.currentPortalData.personnel.find(p => p.id === personId);
    if (user && user.files) {
        const file = user.files.find(f => f.type === fileType && f.name === fileName);
        if (file) {
            // Create a modal to display the file
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content" style="max-width: 90%; max-height: 90%;">
                    <div class="modal-header">
                        <h3>📄 ${fileName}</h3>
                        <button class="modal-close" onclick="closeModal()">&times;</button>
                    </div>
                    <div class="modal-body" style="padding: 0;">
                        ${file.type === 'profile' ? 
                            `<img src="${file.data}" alt="${fileName}" style="max-width: 100%; height: auto; border-radius: 8px;">` :
                            file.type === 'cv' || file.type === 'agreement' || file.type === 'id' || file.type === 'contract' ?
                            `<iframe src="${file.data}" style="width: 100%; height: 600px; border: none;"></iframe>` :
                            `<div style="padding: 20px; text-align: center;">
                                <p>File type: ${file.type}</p>
                                <p>File name: ${fileName}</p>
                                <button class="action-btn primary" onclick="downloadFile('${personId}', '${fileType}', '${fileName}')">💾 Download File</button>
                            </div>`
                        }
                    </div>
                    <div class="modal-footer">
                        <button class="action-btn secondary" onclick="closeModal()">Close</button>
                        <button class="action-btn primary" onclick="downloadFile('${personId}', '${fileType}', '${fileName}')">💾 Download</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
        }
    }
}

function downloadFile(personId, fileType, fileName) {
    const user = window.currentPortalData.personnel.find(p => p.id === personId);
    if (user && user.files) {
        const file = user.files.find(f => f.type === fileType && f.name === fileName);
        if (file) {
            // Create download link
            const link = document.createElement('a');
            link.href = file.data;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showNotification('File Downloaded', `${fileName} downloaded successfully`, 'success');
        }
    }
}

    const notification = document.createElement('div');
    notification.className = `notification ${type}`;
    notification.innerHTML = `
        <div class="notification-header">
            <h4>${title}</h4>
            <button class="notification-close" onclick="this.parentElement.parentElement.remove()">&times;</button>
        </div>
        <div class="notification-body">
            <p>${message}</p>
        </div>
    `;
    
    // Add to page
    document.body.appendChild(notification);
    
    // Auto-remove after 15 seconds (increased from 5 seconds)

        }

// Save document changes
async function saveDocument(event, docId) {
    event.preventDefault();
    
    try {
        // Check if KashTecAPI is available
        if (typeof KashTecAPI === 'undefined') {
            console.warn('KashTecAPI not available, using fallback');
            saveDocumentFallback(event, docId);
            return;
        }
        
        const formData = {
            title: document.getElementById('docTitle').value,
            type: document.getElementById('docType').value,
            department: document.getElementById('docDepartment').value,
            description: document.getElementById('docDescription').value,
            content: document.getElementById('docContent').value,
            status: document.getElementById('docStatus').value,
            updatedAt: new Date().toISOString()
        };
        
        const response = await KashTecAPI.updateDocument(docId, formData);
        
        if (response.success) {
            customAlert('Document updated successfully!', 'Success', 'success');
            editDocuments(); // Return to document list
        } else {
            customAlert('Failed to update document', 'Error', 'error');
        }
    } catch (error) {
        console.error('Error saving document:', error);
        customAlert('Error saving document', 'Error', 'error');
    }
}

// Fallback save document function
function saveDocumentFallback(event, docId) {
    event.preventDefault();
    
    const formData = {
        title: document.getElementById('docTitle').value,
        type: document.getElementById('docType').value,
        department: document.getElementById('docDepartment').value,
        description: document.getElementById('docDescription').value,
        content: document.getElementById('docContent').value,
        status: document.getElementById('docStatus').value,
        updatedAt: new Date().toISOString()
    };
    
    // Save to localStorage as fallback
    const savedDocs = JSON.parse(localStorage.getItem('savedDocuments') || '{}');
    savedDocs[docId] = formData;
    localStorage.setItem('savedDocuments', JSON.stringify(savedDocs));
    
    customAlert('Document saved successfully! (Local Storage)', 'Success', 'success');
    
    // Return to document list after a short delay
    setTimeout(() => {
        editDocuments();
    }, 1500);
}

// Download document
async function downloadDoc(docId) {
    try {
        // Check if KashTecAPI is available
        if (typeof KashTecAPI === 'undefined') {
            console.warn('KashTecAPI not available, using fallback');
            downloadDocFallback(docId);
            return;
        }
        
        const blob = await KashTecAPI.downloadDocument(docId);
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `document_${docId}`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
        
        customAlert('Document downloaded successfully!', 'Success', 'success');
    } catch (error) {
        console.error('Error downloading document:', error);
        customAlert('Error downloading document', 'Error', 'error');
    }
}

// Fallback download document function
function downloadDocFallback(docId) {
    try {
        // Check localStorage for saved document
        const savedDocs = JSON.parse(localStorage.getItem('savedDocuments') || '{}');
        const doc = savedDocs[docId] || {
            id: docId,
            title: `Document ${docId}`,
            content: 'This is sample document content for demonstration purposes.',
            type: 'Policy'
        };
        
        // Create a text file with document content
        const content = `Document: ${doc.title}\nType: ${doc.type}\nID: ${doc.id}\n\n${doc.content}`;
        const blob = new Blob([content], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${doc.title.replace(/\s+/g, '_')}_${docId}.txt`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
        
        customAlert('Document downloaded successfully! (Local Storage)', 'Success', 'success');
    } catch (error) {
        console.error('Error downloading document (fallback):', error);
        customAlert('Error downloading document', 'Error', 'error');
    }
}

// Delete document function
async function deleteDoc(docId, docTitle) {
    // Confirm deletion
    const confirmed = confirm(`Are you sure you want to delete "${docTitle}"?\n\nThis action cannot be undone.`);
    if (!confirmed) {
        return;
    }

    try {
        // Check if KashTecAPI is available
        if (typeof KashTecAPI !== 'undefined' && KashTecAPI.deleteDocument) {
            console.log('🗑️ Deleting document via API:', docId);
            await KashTecAPI.deleteDocument(docId);
            customAlert('Document deleted successfully!', 'Success', 'success');
        } else {
            // Fallback deletion
            console.log('🗑️ Using fallback delete for document:', docId);
            deleteDocFallback(docId, docTitle);
        }

        // Remove the document from the UI
        const docElement = document.querySelector(`[data-id="${docId}"]`);
        if (docElement) {
            docElement.remove();
            console.log('✅ Document removed from UI:', docId);
        }

        // Refresh the document list
        setTimeout(() => {
            loadDocuments();
        }, 1000);

    } catch (error) {
        console.error('❌ Error deleting document:', error);
        customAlert('Error deleting document: ' + error.message, 'Error', 'error');
    }
}

// Fallback delete document function
function deleteDocFallback(docId, docTitle) {
    try {
        // Remove from localStorage if exists
        const savedDocs = JSON.parse(localStorage.getItem('savedDocuments') || '{}');
        if (savedDocs[docId]) {
            delete savedDocs[docId];
            localStorage.setItem('savedDocuments', JSON.stringify(savedDocs));
            console.log('🗑️ Document removed from localStorage:', docId);
        }

        customAlert(`Document "${docTitle}" deleted successfully! (Local Storage)`, 'Success', 'success');
    } catch (error) {
        console.error('Error deleting document (fallback):', error);
        customAlert('Error deleting document', 'Error', 'error');
    }
}

    if (confirmApproval) {
        // Show loading notification

            message: `Approving senior hiring request ${hireId}...`,
            hireId: hireId
        });
        
        // Send approval to backend API
        fetch(`/api/senior-hiring/${hireId}/approve`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify({
                approvedBy: 'Managing Director',
                comments: 'Approved by MD - proceed with HR onboarding'
            })
        })
        .then(response => {
            console.log('📡 Senior Hiring Approval API Response status:', response.status);
            return response.json();
        })
        .then(data => {
            console.log('📊 Senior Hiring Approval API Response data:', data);
            
            if (data.error) {
                throw new Error(data.error);
            }
            
            // Show detailed success notification
            showRealProblemNotification('SUCCESS', {
                message: `✅ Senior hiring request approved successfully!\n\n📋 Details:\n• Hire ID: ${hireId}\n• Approved by: Managing Director\n• Status: Approved\n• Database ID: ${data.id || hireId}\n\n🎉 Senior hiring request saved to database without page refresh!`,
                hireId: hireId,
                approvedBy: 'Managing Director',
                timestamp: new Date().toLocaleString()
            });
        })
        .catch(error => {
            console.error('❌ Error approving senior hiring:', error);
            
            // Determine specific error cause
            let errorCause = 'Unknown error occurred';
            let troubleshooting = '';
            
            if (error.message.includes('NetworkError') || error.message.includes('fetch')) {
                errorCause = 'Network connection failed';
                troubleshooting = '• Check internet connection\n• Verify server is running\n• Try again in a moment';
            } else if (error.message.includes('400')) {
                errorCause = 'Invalid approval data';
                troubleshooting = '• Hire ID is valid\n• Approver information is correct\n• Check request format';
            } else if (error.message.includes('404')) {
                errorCause = 'Senior hiring request not found';
                troubleshooting = '• Hire ID may not exist\n• Check hiring request list\n• Verify request is still pending';
            } else if (error.message.includes('500')) {
                errorCause = 'Server internal error';
                troubleshooting = '• Database connection issue\n• Server configuration problem\n• Contact system administrator';
            } else if (error.message.includes('database') || error.message.includes('SQL')) {
                errorCause = 'Database operation failed';
                troubleshooting = '• Database connection issue\n• Senior hiring tables might not exist\n• Contact system administrator';
            }
            
            // Show detailed error notification
            showRealProblemNotification('SYSTEM_ERROR', {
                error: error.message,
                cause: errorCause,
                troubleshooting: troubleshooting,
                message: `❌ Senior hiring approval failed!\n\n🔍 Error Cause: ${errorCause}\n\n🛠️ Troubleshooting:\n${troubleshooting}\n\n📝 Technical Details:\n${error.message}\n\n💡 Please fix the issue and try again.`,
                hireId: hireId,
                timestamp: new Date().toLocaleString()
            });
        });
    }
}

<!-- Custom Modal Functions -->
<script>
function showRejectModal(workId, workType, callback) {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-content">
            <div class="modal-header">
                <h2>Reject Work Item</h2>
                <p>Work ID: ${workId} | Type: ${workType}</p>
            </div>
            <form id="rejectForm">
                <div class="form-group">
                    <label for="rejectionReason">Rejection Reason *</label>
                    <select id="rejectionReason" required>
                        <option value="">Select a reason</option>
                        <option value="incomplete">Incomplete Information</option>
                        <option value="incorrect">Incorrect Information</option>
                        <option value="procedural">Procedural Issues</option>
                        <option value="quality">Quality Standards Not Met</option>
                        <option value="timeline">Timeline Issues</option>
                        <option value="budget">Budget Constraints</option>
                        <option value="other">Other</option>
                    </select>
                    <div class="error-message">Please select a rejection reason</div>
                </div>
                <div class="form-group">
                    <label for="rejectionDetails">Detailed Explanation *</label>
                    <textarea id="rejectionDetails" placeholder="Please provide detailed explanation for rejection..." required></textarea>
                    <div class="error-message">Please provide detailed explanation</div>
                </div>
                <div class="form-group">
                    <label for="rejectionRecommendation">Recommendations for Improvement</label>
                    <textarea id="rejectionRecommendation" placeholder="Suggestions for improving this work item..."></textarea>
                </div>
                <div class="form-group">
                    <label for="notifySubmitter">Notify Submitter</label>
                    <select id="notifySubmitter">
                        <option value="immediately">Immediately</option>
                        <option value="daily">Daily Summary</option>
                        <option value="weekly">Weekly Summary</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-submit">Reject Work Item</button>
                </div>
            </form>
        </div>
    `;
    
    document.body.appendChild(modal);
    
    // Add form submission handler
    document.getElementById('rejectForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Validate form
        let isValid = true;
        const rejectionReason = document.getElementById('rejectionReason');
        const rejectionDetails = document.getElementById('rejectionDetails');
        
        // Reset error states
        document.querySelectorAll('.form-group').forEach(group => {
            group.classList.remove('error');
            const errorMessage = group.querySelector('.error-message');
            if (errorMessage) {
                errorMessage.style.display = 'none';
            }
        });
        
        if (!rejectionReason.value) {
            rejectionReason.parentElement.classList.add('error');
            const errorMessage = rejectionReason.parentElement.querySelector('.error-message');
            if (errorMessage) {
                errorMessage.style.display = 'block';
            }
            isValid = false;
        }
        
        if (!rejectionDetails.value.trim()) {
            rejectionDetails.parentElement.classList.add('error');
            const errorMessage = rejectionDetails.parentElement.querySelector('.error-message');
            if (errorMessage) {
                errorMessage.style.display = 'block';
            }
            isValid = false;
        }
        
        if (isValid) {
            const formData = {
                workId: workId,
                workType: workType,
                rejectionReason: rejectionReason.value,
                rejectionDetails: rejectionDetails.value,
                rejectionRecommendation: document.getElementById('rejectionRecommendation').value,
                notifySubmitter: document.getElementById('notifySubmitter').value
            };
            
            callback(formData);
            closeModal();
        }
    });
    
    // Close modal on overlay click
    modal.addEventListener('click', function(e) {
        if (e.target === modal) {
            closeModal();
        }
    });
}

function showRevisionModal(workId, workType, callback) {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-content">
            <div class="modal-header">
                <h2>Request Revision</h2>
                <p>Work ID: ${workId} | Type: ${workType}</p>
            </div>
            <form id="revisionForm">
                <div class="form-group">
                    <label for="revisionType">Revision Type *</label>
                    <select id="revisionType" required>
                        <option value="">Select revision type</option>
                        <option value="minor">Minor Changes</option>
                        <option value="major">Major Changes</option>
                        <option value="clarification">Clarification Needed</option>
                        <option value="additional">Additional Information</option>
                        <option value="format">Format Changes</option>
                    </select>
                    <div class="error-message">Please select revision type</div>
                </div>
                <div class="form-group">
                    <label for="revisionDetails">Revision Request *</label>
                    <textarea id="revisionDetails" placeholder="Please specify what needs to be revised..." required></textarea>
                    <div class="error-message">Please provide revision details</div>
                </div>
                <div class="form-group">
                    <label for="revisionPriority">Priority Level</label>
                    <select id="revisionPriority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                        <option value="urgent">Urgent</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="expectedTimeline">Expected Completion Date</label>
                    <input type="date" id="expectedTimeline" min="${new Date().toISOString().split('T')[0]}">
                </div>
                <div class="form-group">
                    <label for="revisionNotes">Additional Notes</label>
                    <textarea id="revisionNotes" placeholder="Any additional instructions or context..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-revision">Request Revision</button>
                </div>
            </form>
        </div>
    `;
    
    document.body.appendChild(modal);
    
    // Add form submission handler
    document.getElementById('revisionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Validate form
        let isValid = true;
        const revisionType = document.getElementById('revisionType');
        const revisionDetails = document.getElementById('revisionDetails');
        
        // Reset error states
        document.querySelectorAll('.form-group').forEach(group => {
            group.classList.remove('error');
            group.querySelector('.error-message').style.display = 'none';
        });
        
        if (!revisionType.value) {
            revisionType.parentElement.classList.add('error');
            revisionType.parentElement.querySelector('.error-message').style.display = 'block';
            isValid = false;
        }
        
        if (!revisionDetails.value.trim()) {
            revisionDetails.parentElement.classList.add('error');
            revisionDetails.parentElement.querySelector('.error-message').style.display = 'block';
            isValid = false;
        }
        
        if (isValid) {
            const formData = {
                workId: workId,
                workType: workType,
                revisionType: revisionType.value,
                revisionDetails: revisionDetails.value,
                revisionPriority: document.getElementById('revisionPriority').value,
                expectedTimeline: document.getElementById('expectedTimeline').value,
                revisionNotes: document.getElementById('revisionNotes').value
            };
            
            callback(formData);
            closeModal();
        }
    });
    
    // Close modal on overlay click
    modal.addEventListener('click', function(e) {
        if (e.target === modal) {
            closeModal();
        }
    });
}

function closeModal() {
    const modal = document.querySelector('.modal-overlay');
    if (modal) {
        modal.remove();
    }
}

function showReportTab(tabName) {
    // Update tab buttons
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`[onclick="showReportTab('${tabName}')"]`).classList.add('active');
    
    // Show corresponding content
    document.querySelectorAll('.tab-content').forEach(content => content.style.display = 'none');
    const targetContent = document.getElementById(tabName + 'Report');
    if (targetContent) {
        targetContent.style.display = 'block';
    }
}
