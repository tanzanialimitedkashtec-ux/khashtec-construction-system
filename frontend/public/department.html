// Load employees for leave and contract forms
async function loadEmployeesForLeaveContracts() {
    console.log('🔄 Loading employees for leave & contracts...');
    
    try {
        const baseUrl = window.location.origin;
        const response = await fetch(`${baseUrl}/api/employees`, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${sessionManager.getAuthToken()}`
            }
        });
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const employees = await response.json();
        console.log('📊 Employees for leave & contracts:', employees);
        
        // Update leave form employee dropdown
        const leaveSelect = document.getElementById('leaveEmployee');
        if (leaveSelect) {
            leaveSelect.innerHTML = '<option value="">Select Employee</option>';
            employees.forEach(employee => {
                const option = document.createElement('option');
                option.value = employee.id;
                const displayName = employee.full_name || `Employee ${employee.id}`;
                const position = employee.position || 'Unknown Position';
                option.textContent = `${displayName} - ${position}`;
                leaveSelect.appendChild(option);
            });
        }
        
        // Update contract form employee dropdown
        const contractSelect = document.getElementById('contractEmployee');
        if (contractSelect) {
            contractSelect.innerHTML = '<option value="">Select Employee</option>';
            employees.forEach(employee => {
                const option = document.createElement('option');
                option.value = employee.id;
                const displayName = employee.full_name || `Employee ${employee.id}`;
                const position = employee.position || 'Unknown Position';
                option.textContent = `${displayName} - ${position}`;
                contractSelect.appendChild(option);
            });
        }
        
        console.log(`✅ Employee dropdowns populated with ${employees.length} employees`);
        
    } catch (error) {
        console.error('❌ Error loading employees for leave & contracts:', error);
        
        // Update both dropdowns with error state
        const leaveSelect = document.getElementById('leaveEmployee');
        const contractSelect = document.getElementById('contractEmployee');
        
        if (leaveSelect) {
            leaveSelect.innerHTML = '<option value="">Error loading employees</option>';
        }
        if (contractSelect) {
            contractSelect.innerHTML = '<option value="">Error loading employees</option>';
        }
    }
}

// Additional helper functions
function saveWorkerAccount() {
    // Prevent multiple submissions
    if (window.workerAccountSubmitting) {
        console.log('⚠️ Worker account submission already in progress');
        return false;
    }
    
    window.workerAccountSubmitting = true;
    
    console.log('💾 Saving worker account...');
    
    try {
        // Get form values
        const empID = document.getElementById('workerEmpID')?.value;
        const fullName = document.getElementById('workerFullName')?.value;
        const email = document.getElementById('workerEmail')?.value;
        const phone = document.getElementById('workerPhone')?.value;
        const department = document.getElementById('workerDepartment')?.value;
        const jobTitle = document.getElementById('workerJobTitle')?.value;
        const accountType = document.getElementById('workerAccountType')?.value;
        const accessLevel = document.getElementById('workerAccessLevel')?.value;
        const password = document.getElementById('workerPassword')?.value;
        const notes = document.getElementById('workerNotes')?.value;
        
        console.log('📝 Worker account data:', { empID, fullName, email, phone, department, jobTitle, accountType, accessLevel });
        
        // Validate required fields
        if (!empID || !fullName || !email || !phone || !department || !jobTitle || !accountType || !accessLevel || !password) {
            customAlert('Please fill in all required fields.', "Validation Error", "error");
            window.workerAccountSubmitting = false;
            return false;
        }
        
        // Show loading state
        const submitButton = document.querySelector('#workerAccountForm button[type="submit"]');
        const originalText = submitButton.textContent;
        submitButton.textContent = 'Creating Account...';
        submitButton.disabled = true;
        
        // Send data to worker accounts API with file uploads
        console.log('📤 Creating worker account via API with file uploads...');
        const baseUrl = window.location.origin;
        
        // Create FormData for file upload
        const formData = new FormData();
        formData.append('employeeId', empID);
        formData.append('fullName', fullName);
        formData.append('workEmail', email);
        formData.append('phoneNumber', phone);
        formData.append('department', department);
        formData.append('jobTitle', jobTitle);
        formData.append('accountType', accountType);
        formData.append('accessLevel', accessLevel);
        formData.append('temporaryPassword', password);
        formData.append('accountNotes', notes || '');
        
        // Add profile picture if selected
        const profilePicInput = document.getElementById('workerProfile');
        if (profilePicInput && profilePicInput.files[0]) {
            console.log('📸 Adding worker profile picture to upload:', profilePicInput.files[0].name);
            formData.append('workerProfile', profilePicInput.files[0]);
        } else {
            console.log('📸 No worker profile picture selected');
        }
        
        // Add ID document if selected
        const idDocInput = document.getElementById('workerID');
        if (idDocInput && idDocInput.files[0]) {
            console.log('📄 Adding worker ID document to upload:', idDocInput.files[0].name);
            formData.append('workerID', idDocInput.files[0]);
        } else {
            console.log('📄 No worker ID document selected');
        }
        
        // Add contract document if selected
        const contractDocInput = document.getElementById('workerContract');
        if (contractDocInput && contractDocInput.files[0]) {
            console.log('📄 Adding worker contract document to upload:', contractDocInput.files[0].name);
            formData.append('workerContract', contractDocInput.files[0]);
        } else {
            console.log('📄 No worker contract document selected');
        }
        
        fetch(`${baseUrl}/api/worker-accounts`, {
            method: 'POST',
            headers: {
                'Accept': 'application/json',
                'Authorization': `Bearer ${sessionManager.getAuthToken()}`
                // Don't set Content-Type - FormData sets it automatically with boundary
            },
            body: formData
        })
        .then(response => {
            console.log('📡 Worker account API response status:', response.status);
            
            // Handle 409 Conflict as a special case (not an error)
            if (response.status === 409) {
                console.log('⚠️ Worker account already exists - showing user notification');
                customAlert(`⚠️ Worker account already exists!\n\n📋 Details:\n• Email: ${email}\n• Employee ID: ${empID}\n\n💡 This worker account is already registered in the system.\n\nPlease use a different email address or check if the account already exists.`, "Account Already Exists", "warning");
                
                // Reset button
                submitButton.textContent = originalText;
                submitButton.disabled = false;
                return false;
            }
            
            if (response.status === 400) {
                throw new Error('Invalid worker data - Check all required fields');
            }
            if (response.status >= 500) {
                throw new Error('Server error during worker account creation');
            }
            
            return response.json();
        })
        .then(data => {
            console.log('📊 Worker account API response:', data);
            
            if (data.success === false) {
                throw new Error(data.error || 'Failed to create worker account');
            }
            
            // Success message
            customAlert(`✅ Worker account created successfully!\n\n📋 Details:\n• Employee ID: ${empID}\n• Name: ${fullName}\n• Email: ${email}\n• Department: ${department}\n• Job Title: ${jobTitle}\n• Account Type: ${accountType}\n• Access Level: ${accessLevel}\n\n🎉 Worker account saved to database!`, "Worker Account Created", "success");
            
            // Clear form
            document.getElementById('workerAccountForm').reset();
            
            // Reset button
            submitButton.textContent = originalText;
            submitButton.disabled = false;
            
            return false;
        })
        .catch(error => {
            console.error('❌ Error creating worker account:', error);
            
            // Reset button
            submitButton.textContent = originalText;
            submitButton.disabled = false;
            
            // Determine specific error cause
            let errorMessage = error.message;
            
            if (error.message.includes('NetworkError') || error.message.includes('fetch')) {
                errorMessage = 'Network connection failed. Please check internet connection and try again.';
            } else if (error.message.includes('400')) {
                errorMessage = 'Invalid worker data. Please fill all required fields correctly.';
            } else if (error.message.includes('409')) {
                errorMessage = 'Worker with this email already exists. Please use a different email.';
            } else if (error.message.includes('404')) {
                errorMessage = 'Worker account API endpoint not found. Please contact system administrator.';
            } else if (error.message.includes('500')) {
                errorMessage = 'Server internal error. Please try again later or contact support.';
            }
            
            customAlert(`❌ Failed to create worker account!\n\n🔍 Error: ${errorMessage}\n\n💡 Please fix the issue and try again.`, "Account Creation Failed", "error");
        })
        .finally(() => {
            // Reset submission flag
            window.workerAccountSubmitting = false;
        });
        
    } catch (error) {
        console.error('❌ Error saving worker account:', error);
        customAlert(`Unexpected error: ${error.message}\n\nPlease check browser console for details.`, "System Error", "error");
        window.workerAccountSubmitting = false;
        return false;
    }
    
    return false; // Always prevent form submission
}

function selectEmployeeForUpdate(email) {
    console.log('🔄 Selecting employee for update:', email);

    fetch('/api/employees')
        .then(response => response.json())
        .then(data => {
            // Handle different response formats
            let employees = [];
            
            if (Array.isArray(data)) {
                employees = data;
            } else if (data.employees && Array.isArray(data.employees)) {
                employees = data.employees;
            } else if (data.employee && Array.isArray(data.employee)) {
                employees = data.employee;
            } else if (data && typeof data === 'object') {
                // Single employee object - convert to array
                employees = [data];
            } else {
                employees = [];
            }
            
            console.log('?? Available employees:', employees);
            
            // Handle both ID and email searches
            console.log('?? Searching for employee with parameter:', email, 'type:', typeof email);
            console.log('?? Available employees:', employees.map(emp => ({
                id: emp.id,
                employee_id: emp.employee_id,
                gmail: emp.gmail,
                idType: typeof emp.id,
                empIdType: typeof emp.employee_id
            })));
            
            const employee = employees.find(emp => {
                // If email parameter looks like a number, search by ID
                if (!isNaN(email)) {

                    console.log('?? Checking employee_id match:', emp.employee_id, '===', email, '=', empIdMatch);

            });
            
            console.log('?? Selected employee:', employee);

function saveEmployeeUpdate() {
    console.log('💾 Updating employee record...');
    
    // Get form values
    const employeeId = document.getElementById('updateEmpID').value;
    const updatedEmployee = {
        fullName: document.getElementById('updateFullName').value,
        phone: document.getElementById('updatePhone').value,
        gmail: document.getElementById('updateGmail').value,
        department: document.getElementById('updateDepartment').value,
        jobCategory: document.getElementById('updateJobCategory').value,
        contract: document.getElementById('updateContract').value,
        status: document.getElementById('updateStatus').value,
        notes: document.getElementById('updateNotes').value
    };
    
    console.log('📊 Employee data to update:', updatedEmployee);
    console.log('🆔 Employee ID:', employeeId);
    
    // Validate required fields
    if (!updatedEmployee.fullName || !updatedEmployee.phone || !updatedEmployee.gmail || !updatedEmployee.department || !updatedEmployee.jobCategory || !updatedEmployee.contract || !updatedEmployee.status) {
        customAlert('Please fill in all required fields marked with *', 'Validation Error', 'error');
        return false;
    }
    
    // Show loading state
    const submitBtn = document.querySelector('#updateEmployeeForm button[type="submit"]');
    const originalText = submitBtn.textContent;
    submitBtn.textContent = 'Updating...';
    submitBtn.disabled = true;
    
    // Update employee via API
    fetch(`/api/employees/${employeeId}`, {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(updatedEmployee)
    })
    .then(response => {
        console.log('📡 Update response status:', response.status);
        
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        return response.json();
    })
    .then(data => {
        console.log('✅ Employee updated successfully:', data);
        
        customAlert(
            `Employee record updated successfully!\n\nName: ${updatedEmployee.fullName}\nDepartment: ${updatedEmployee.department}\nStatus: ${updatedEmployee.status}`, 
            "Employee Updated", 
            "success"
        );
        
        // Reset form and hide it
        document.getElementById('updateEmployeeForm').reset();
        document.getElementById('updateForm').classList.add('hidden');
        document.getElementById('employeeSearchResults').innerHTML = '';
        
    })
    .catch(error => {
        console.error('❌ Error updating employee:', error);
        customAlert(`Failed to update employee: ${error.message}\n\nPlease check the employee ID and try again.`, 'Update Failed', 'error');
    })
    .finally(() => {
        // Restore button state
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
    });
    
    return false; // Prevent form submission
}

// Auto-calculate leave days
document.addEventListener('change', function(e) {
    if (e.target.id === 'leaveStartDate' || e.target.id === 'leaveEndDate') {
        const startDate = new Date(document.getElementById('leaveStartDate').value);
        const endDate = new Date(document.getElementById('leaveEndDate').value);
        
        if (startDate && endDate && endDate >= startDate) {
            const days = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;
            document.getElementById('leaveDays').value = days;
        }
    }
});

// REAL PROBLEM DETECTION AND NOTIFICATION SYSTEM
function analyzeRealProblem(error) {
    const errorMessage = error.message.toLowerCase();
    
    if (errorMessage.includes('network') || errorMessage.includes('fetch')) {
        return 'NETWORK_ERROR';
    } else if (errorMessage.includes('404') || errorMessage.includes('not found')) {
        return 'API_ENDPOINT_NOT_FOUND';
    } else if (errorMessage.includes('500') || errorMessage.includes('internal server error')) {
        return 'SERVER_ERROR';
    } else if (errorMessage.includes('400') || errorMessage.includes('bad request')) {
        return 'VALIDATION_ERROR';
    } else if (errorMessage.includes('connection') || errorMessage.includes('connect')) {
        return 'DATABASE_CONNECTION_ERROR';
    } else if (errorMessage.includes('timeout')) {
        return 'TIMEOUT_ERROR';
    } else if (errorMessage.includes('cors')) {
        return 'CORS_ERROR';
    } else if (errorMessage.includes('json')) {
        return 'JSON_PARSE_ERROR';
    } else {
        return 'UNKNOWN_ERROR';
    }
}

// GLOBAL FORM PROTECTION SYSTEM
function applyGlobalFormProtection() {
    console.log('🛡️ Applying global form protection...');
    
    // 1. Find all forms and remove their submission behavior
    const allForms = document.querySelectorAll('form');
    allForms.forEach((form, index) => {
        console.log(`🔧 Protecting form ${index + 1}:`, form.id || 'unnamed');
        
        // Remove form attributes that cause submission
        form.removeAttribute('onsubmit');
        form.removeAttribute('action');
        form.removeAttribute('method');
        form.setAttribute('data-protected', 'true');
        
        // Add submit prevention
        form.addEventListener('submit', function(e) {
            console.log('🚫 Form submission prevented:', form.id);
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            return false;
        }, true);
    });
    
    // 2. Find all submit buttons and convert them to manual buttons
    const submitButtons = document.querySelectorAll('button[type="submit"], input[type="submit"]');
    submitButtons.forEach((button, index) => {
        console.log(`🔘 Converting submit button ${index + 1}:`, button.textContent);
        
        // Change type to button
        button.setAttribute('type', 'button');
        
        // Add click prevention if no onclick handler
        if (!button.onclick && !button.getAttribute('onclick')) {
            button.addEventListener('click', function(e) {
                console.log('🚫 Submit button click prevented:', button.textContent);
                e.preventDefault();
                e.stopPropagation();
                showRealProblemNotification('NO_HANDLER', {
                    buttonText: button.textContent,
                    message: 'This button has no action handler. Please contact support.'
                });
                return false;
            }, true);
        }
    });
    
    console.log('✅ Global form protection applied');
}

function manualSubmitIncident() {

    try {
        // Validate required fields
        const incidentType = document.getElementById('incidentType').value;
        const severityLevel = document.getElementById('severityLevel').value;
        const incidentDescription = document.getElementById('incidentDescription').value;
        const reportedBy = document.getElementById('reportedBy').value;
        
        console.log('📝 Form values:', { incidentType, severityLevel, incidentDescription, reportedBy });
        
        if (!incidentType || !severityLevel || !incidentDescription || !reportedBy) {
            console.log('❌ Validation failed - missing required fields');
            customAlert('Please fill in all required fields:\n\n• Incident Type\n• Severity Level\n• Incident Description\n• Reported By', "Validation Error", "error");
            return;
        }
        
        const workItem = {
            work_type: 'Incident Reporting',
            work_title: `Incident Report - ${incidentType}`,
            work_description: incidentDescription,
            incident_type: incidentType,
            severity: severityLevel,
            priority: severityLevel === 'critical' || severityLevel === 'fatal' ? 'Critical' : 
                      severityLevel === 'major' ? 'High' : 'Medium',
            due_date: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], // 7 days from now
            assigned_to: 'HSE Manager',
            submitted_by: reportedBy
        };
        
        console.log('📝 Sending work item to database:', workItem);
        
        // Show loading message
        customAlert('Saving incident report to database...', "Processing", "info");
        
        // Get the current origin for absolute URLs
        const baseUrl = window.location.origin;
        console.log('📍 Using server:', baseUrl);
        
        // Send data to backend API
        fetch(`${baseUrl}/api/hse/work`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(workItem)
        })
        .then(response => {
            console.log('📡 Database response status:', response.status);
            
            if (!response.ok) {
                throw new Error(`Server responded with ${response.status}: ${response.statusText}`);
            }
            
            return response.json();
        })
        .then(data => {
            console.log('📊 Database save result:', data);
            
            if (data.error) {
                throw new Error(data.error);
            }
            
            // Success message with database confirmation
            customAlert(`✅ Incident report saved to database!\n\n📋 Details:\n• ID: ${data.workItem.id}\n• Type: ${workItem.incident_type}\n• Severity: ${workItem.severity}\n• Priority: ${workItem.priority}\n• Assigned to: ${workItem.assigned_to}\n• Submitted by: ${workItem.submitted_by}\n• Date: ${new Date().toLocaleString()}\n\n🎉 Data successfully stored in MySQL database!\n💾 Table: hse_work`, "Database Save Success!", "success");
            
            // Reset form
            resetIncidentForm();
            
            // Optional: Verify data was saved by fetching recent items

        if (score >= 90) return 'good';
        if (score >= 75) return 'moderate';
        return 'poor';
    }
    
    // Format date
    function formatDate(dateString) {
        if (!dateString) return 'No data';
        const date = new Date(dateString);

            year: 'numeric', 
            month: 'short',

        });

// Filter safety projects based on selected criteria
function filterSafetyProjects() {
    const filterValue = document.querySelector('.project-filter select')?.value;
    const projectItems = document.querySelectorAll('.project-safety-item');
    
    console.log('🔍 Filtering projects by:', filterValue);
    
    projectItems.forEach(item => {
        let shouldShow = true;
        
        if (filterValue === 'high-risk') {
            const riskLevel = item.querySelector('.risk-high');
            shouldShow = riskLevel !== null;
        } else if (filterValue === 'recent-incidents') {
            const daysWithoutIncident = parseInt(item.querySelector('.safety-stat:nth-child(1) .value')?.textContent || '0');
            shouldShow = daysWithoutIncident < 7;
        } else if (filterValue === 'good-performance') {
            const safetyScoreText = item.querySelector('.safety-score')?.textContent || '';
            const safetyScore = parseInt(safetyScoreText.match(/\d+/)?.[0] || '0');
            shouldShow = safetyScore >= 90;
        }
        
        item.style.display = shouldShow ? 'block' : 'none';
    });
    
    // Update visible count
    const visibleCount = Array.from(projectItems).filter(item => item.style.display !== 'none').length;
    const filterLabel = document.querySelector('.project-filter select option:checked')?.textContent || 'All Projects';
    
    console.log(`✅ Showing ${visibleCount} projects for filter: ${filterLabel}`);
}

function saveIncidentReport() {
    console.log('🚀 saveIncidentReport function called');
    
    try {
        // Validate required fields
        const incidentType = document.getElementById('incidentType').value;
        const severityLevel = document.getElementById('severityLevel').value;
        const incidentDescription = document.getElementById('incidentDescription').value;
        
        console.log('📝 Form values:', { incidentType, severityLevel, incidentDescription });
        
        if (!incidentType || !severityLevel || !incidentDescription) {
            console.log('❌ Validation failed - missing required fields');
            customAlert('Please fill in all required fields:\n\n• Incident Type\n• Severity Level\n• Incident Description', "Validation Error", "error");
            return false;
        }
        
        const workItem = {
            work_type: 'Incident Reporting',
            work_title: `Incident Report - ${incidentType}`,
            work_description: incidentDescription,
            incident_type: incidentType,
            severity: severityLevel === 'critical' ? 'Critical' : 
                      severityLevel === 'major' ? 'High' : 
                      severityLevel === 'minor' ? 'Low' : 'Medium',
            location: document.getElementById('incidentLocation')?.value || 'Construction Site', // Required field
            project_name: document.getElementById('incidentProject')?.value || 'Building A', // Required field
            priority: severityLevel === 'critical' ? 'Critical' : 
                      severityLevel === 'major' ? 'High' : 
                      severityLevel === 'minor' ? 'Low' : 'Medium',
            due_date: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], // 7 days from now
            assigned_to: 'HSE Manager',
            submitted_by: 'HSE Manager'
        };
        
        console.log('📝 Sending work item:', workItem);
        
        // Show loading message
        customAlert('Recording incident report...', "Processing", "info");
        
        // Send data to backend API
        const baseUrl = window.location.origin;
    fetch(`${baseUrl}/api/hse/work`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(workItem)
        })
        .then(response => {
            console.log('📡 API Response status:', response.status);
            return response.json();
        })
        .then(data => {
            console.log('📊 API Response data:', data);
            
            if (data.error) {
                throw new Error(data.error);
            }
            
            // Show detailed success notification
            showRealProblemNotification('SUCCESS', {
                message: `✅ Incident report recorded successfully!\n\n📋 Details:\n• Incident ID: ${data.id}\n• Type: ${workItem.incident_type}\n• Severity: ${workItem.severity}\n• Priority: ${workItem.priority}\n• Assigned to: ${workItem.assigned_to}\n• Due Date: ${workItem.due_date}\n\n🎉 Incident saved to database without page refresh!`,
                incidentId: data.id,
                incidentType: workItem.incident_type,
                severity: workItem.severity,
                timestamp: new Date().toLocaleString()
            });
            
            // Reset form
            document.getElementById('incidentForm').reset();
            
            // Generate new incident ID
            document.getElementById('incidentId').value = 'INC-' + Date.now();
            
            return false;
        })
        .catch(error => {
            console.error('❌ Error recording incident:', error);
            
            // Determine specific error cause
            let errorCause = 'Unknown error occurred';
            let troubleshooting = '';
            
            if (error.message.includes('NetworkError') || error.message.includes('fetch')) {
                errorCause = 'Network connection failed';
                troubleshooting = '• Check internet connection\n• Verify server is running\n• Try again in a moment';
            } else if (error.message.includes('400')) {
                errorCause = 'Invalid incident data';
                troubleshooting = '• Fill all required fields correctly\n• Check incident type selection\n• Verify severity level\n• Ensure description is provided';
            } else if (error.message.includes('404')) {
                errorCause = 'HSE API endpoint not found';
                troubleshooting = '• Server routing issue\n• Contact system administrator';
            } else if (error.message.includes('500')) {
                errorCause = 'Server internal error';
                troubleshooting = '• Database connection issue\n• Server configuration problem\n• Contact system administrator';
            } else if (error.message.includes('validation') || error.message.includes('required')) {
                errorCause = 'Form validation failed';
                troubleshooting = '• Fill all required fields\n• Check field formats\n• Ensure incident type is selected\n• Verify severity level';
            } else if (error.message.includes('database') || error.message.includes('SQL')) {
                errorCause = 'Database operation failed';
                troubleshooting = '• Database connection issue\n• HSE work table might not exist\n• Contact system administrator';
            }
            
            // Show detailed error notification
            showRealProblemNotification('SYSTEM_ERROR', {
                error: error.message,
                cause: errorCause,
                troubleshooting: troubleshooting,
                message: `❌ Incident report failed!\n\n🔍 Error Cause: ${errorCause}\n\n🛠️ Troubleshooting:\n${troubleshooting}\n\n📝 Technical Details:\n${error.message}\n\n💡 Please fix the issue and try again.`,
                incidentType: incidentType || 'Unknown',
                severity: severityLevel || 'Not specified',
                timestamp: new Date().toLocaleString()
            });
            return false;
        });
        
        console.log('✅ Function completed, returning false to prevent form submission');
        return false;
        
    } catch (error) {
        console.error('❌ Unexpected error in saveIncidentReport:', error);
        customAlert(`Unexpected error: ${error.message}\n\nPlease try again or contact support.`, "System Error", "error");
        return false;
    }
}

✅ Required Tables: All exist (${dbCheck.tableCount} total tables)
✅ API Connectivity: Working
✅ Data Storage: Confirmed
✅ ${successfulEndpoints.length}/${endpointResults.length} endpoints working

${failedEndpoints.length > 0 ? `⚠️ ${failedEndpoints.length} endpoints need attention:\n` + failedEndpoints.map(e => `- ${e.name}: ${e.error || e.status}`).join('\n') : '🚀 All systems operational - forms should work perfectly!'}

🛠️ Common Solutions:

function getPpeItems() {
    const items = [];
    const rows = document.querySelectorAll('.ppe-item-row');
    rows.forEach(row => {
        const type = row.querySelector('.ppe-type').value;
        const quantity = row.querySelector('.ppe-quantity').value;
        const size = row.querySelector('.ppe-size').value;
        if (type && quantity) {
            items.push({ type, quantity, size });
        }
    });
    return items;
}

// Additional HSE helper functions
function viewPolicy(policyId) {
    console.log('🔍 Viewing policy:', policyId);
    
    // Show loading message
    customAlert(`Loading safety policy ${policyId}...`, "Loading Policy", "info");
    
    // Fetch policy details from backend
    fetch(`/api/policies/${policyId}`)
        .then(response => {
            console.log('📡 Policy fetch response:', response.status);
            if (!response.ok) {
                throw new Error(`Failed to fetch policy: ${response.status}`);
            }
            return response.json();
        })
        .then(policy => {
            console.log('📊 Policy data:', policy);
            
            if (policy.error) {
                throw new Error(policy.error);
            }
            
            // Display policy in a modal or new section
            showPolicyModal(policy);
        })
        .catch(error => {
            console.error('❌ Error viewing policy:', error);
            customAlert(`Error loading policy: ${error.message}`, "Error", "error");
        });
}

// Finance Helper Functions
function saveDepartmentBudget() {
    const budget = {
        department: document.getElementById('budgetDepartment').value,
        period: document.getElementById('budgetPeriod').value,
        startDate: document.getElementById('budgetStartDate').value,
        endDate: document.getElementById('budgetEndDate').value,
        salaries: document.getElementById('budgetSalaries').value,
        supplies: document.getElementById('budgetSupplies').value,
        equipment: document.getElementById('budgetEquipment').value,
        training: document.getElementById('budgetTraining').value,
        travel: document.getElementById('budgetTravel').value,
        misc: document.getElementById('budgetMisc').value,
        total: document.getElementById('totalBudget').value,
        justification: document.getElementById('budgetJustification').value,
        createdDate: new Date().toLocaleString()
    };
    
    // Helper function to parse TZS values
    const parseTZSValue = (value) => {
        if (!value) return 0;
        // Remove "TZS " prefix and any commas, then parse as number
        const numericValue = value.toString().replace(/^TZS\s*/, '').replace(/,/g, '');
        return parseFloat(numericValue) || 0;
    };
    
    // Validate required fields
    if (!budget.department || !budget.period || !budget.startDate || !budget.endDate || !budget.total) {
        customAlert('Please fill in all required fields:\n\n• Department\n• Budget Period\n• Start Date\n• End Date\n• Total Budget Amount', "Validation Error", "error");
        return false;
    }
    
    // Parse total budget to check if it's greater than 0
    const parsedTotal = parseTZSValue(budget.total);
    if (parsedTotal <= 0) {
        customAlert('Total budget amount must be greater than 0', "Validation Error", "error");
        return false;
    }
    
    // Prepare budget data for workforce budget API
    const budgetData = {
        department: budget.department,
        total_budget: parseTZSValue(budget.total),
        salaries_wages: parseTZSValue(budget.salaries),
        training_development: parseTZSValue(budget.training),
        employee_benefits: parseTZSValue(budget.supplies), // Map supplies to benefits
        recruitment_costs: parseTZSValue(budget.equipment), // Map equipment to recruitment
        justification: budget.justification || `Budget request for ${budget.department} - ${budget.period}`,
        submitted_by: 'Finance Manager',
        budget_period: budget.period
    };
    
    console.log(' Budget data to send:', budgetData);
    
    // Show loading message
    customAlert('Creating budget...', "Processing", "info");
    
    // Send data to workforce budget API
    const baseUrl = window.location.origin;
    
    // Check connectivity first
    if (!navigator.onLine) {
        customAlert('Offline mode - budget will be saved when connection is restored', "Offline", "warning");
        return false;
    }
    
    // Add timeout and better error handling
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 second timeout
    
    fetch(`${baseUrl}/api/workforce-budget`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
            'Authorization': `Bearer ${sessionManager.getAuthToken()}`
        },
        body: JSON.stringify(budgetData),
        signal: controller.signal
    })
    .then(response => {
        console.log('📡 Budget API Response status:', response.status);
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        return response.json();
    })
    .then(data => {
        console.log('📊 Budget API Response data:', data);
        
        if (data.error) {
            throw new Error(data.error);
        }
        
        customAlert(`Budget created successfully!\n\nDepartment: ${budget.department}\nTotal Amount: TZS ${budget.total}\nPeriod: ${budget.period}\nBudget ID: ${data.id}\n\n🎉 Budget saved to database!`, "Budget Created", "success");
        
        document.getElementById('budgetForm').reset();
        return false;
    })
    .catch(error => {
        clearTimeout(timeoutId);
        console.error('❌ Error creating budget:', error);
        
        let errorMessage = 'Failed to create budget';
        
        if (error.name === 'AbortError') {
            errorMessage = 'Request timeout - please check your connection and try again';
        } else if (error.message.includes('Failed to fetch')) {
            errorMessage = 'Network error - please check your internet connection';
        } else if (error.message.includes('HTTP 401')) {
            errorMessage = 'Authentication required - please log in again';
        } else if (error.message.includes('HTTP 500')) {
            errorMessage = 'Server error - please try again later';
        } else if (error.message) {
            errorMessage = error.message;
        }
        
        customAlert(`Error creating budget: ${errorMessage}`, "Error", "error");
        return false;
    });
    
    return false;
}

// Auto-calculate functions
document.addEventListener('input', function(e) {
    if (e.target.id === 'basicSalary' || e.target.id === 'housingAllowance' || 
        e.target.id === 'transportAllowance' || e.target.id === 'medicalAllowance' || 
        e.target.id === 'otherAllowances') {
        calculateGrossSalary();
    }
    
    if (e.target.id.startsWith('budget')) {
        calculateTotalBudget();
    }
});

function calculateGrossSalary() {
    const basic = parseFloat(document.getElementById('basicSalary').value) || 0;
    const housing = parseFloat(document.getElementById('housingAllowance').value) || 0;
    const transport = parseFloat(document.getElementById('transportAllowance').value) || 0;
    const medical = parseFloat(document.getElementById('medicalAllowance').value) || 0;
    const other = parseFloat(document.getElementById('otherAllowances').value) || 0;
    
    const gross = basic + housing + transport + medical + other;
    document.getElementById('grossSalary').value = `TZS ${gross.toLocaleString()}`;
}

function calculateTotalBudget() {
    try {
        const salariesElement = document.getElementById('budgetSalaries');
        const suppliesElement = document.getElementById('budgetSupplies');
        const equipmentElement = document.getElementById('budgetEquipment');
        const trainingElement = document.getElementById('budgetTraining');
        const travelElement = document.getElementById('budgetTravel');
        const miscElement = document.getElementById('budgetMisc');
        
        // Helper function to parse TZS values
        const parseTZSValue = (element) => {
            if (!element) return 0;
            const value = element.value || '0';
            // Remove "TZS " prefix and any commas, then parse as number
            const numericValue = value.replace(/^TZS\s*/, '').replace(/,/g, '');
            return parseFloat(numericValue) || 0;
        };
        
        const salaries = parseTZSValue(salariesElement);
        const supplies = parseTZSValue(suppliesElement);
        const equipment = parseTZSValue(equipmentElement);
        const training = parseTZSValue(trainingElement);
        const travel = parseTZSValue(travelElement);
        const misc = parseTZSValue(miscElement);
        
        const total = salaries + supplies + equipment + training + travel + misc;
        
        // Update individual field displays with numeric values only (since they are type="number")
        if (salariesElement) salariesElement.value = salaries;
        if (suppliesElement) suppliesElement.value = supplies;
        if (equipmentElement) equipmentElement.value = equipment;
        if (trainingElement) trainingElement.value = training;
        if (travelElement) travelElement.value = travel;
        if (miscElement) miscElement.value = misc;
        
        // Update total budget display (only if element exists)
        const totalBudgetElement = document.getElementById('totalBudget');
        if (totalBudgetElement) {
            totalBudgetElement.value = `TZS ${total.toLocaleString()}`;
        }
    } catch (error) {
        console.warn('Budget calculation error:', error);
        // Silently fail to avoid breaking the user experience
    }
}

function saveNewProject() {
    const project = {
        id: 'PRJ-' + Date.now(),
        projectName: document.getElementById('projectName').value,
        projectCode: document.getElementById('projectCode').value,
        clientName: document.getElementById('clientName').value,
        projectType: document.getElementById('projectType').value,
        projectStartDate: document.getElementById('projectStartDate').value,
        projectEndDate: document.getElementById('projectEndDate').value,
        contractValue: document.getElementById('contractValue').value,
        projectManager: document.getElementById('projectManager').value,
        projectDescription: document.getElementById('projectDescription').value,
        keyDeliverables: document.getElementById('keyDeliverables').value,
        siteLocation: document.getElementById('siteLocation').value,
        priorityLevel: document.getElementById('priorityLevel').value,
        status: 'planning',
        progress: 0,
        createdDate: new Date().toLocaleString()
    };
    
    // Validate required fields
    if (!project.projectName || !project.projectCode || !project.clientName || !project.projectStartDate || !project.projectManager) {
        customAlert('Please fill in all required fields:\n\n• Project Name\n• Project Code\n• Client Name\n• Start Date\n• Project Manager', "Validation Error", "error");
        return false;
    }
    
    // Prepare work item for Projects department
    const workItem = {
        work_type: 'Project Creation',
        work_title: `New Project - ${project.projectName}`,
        work_description: `New Project Created\n\nProject Name: ${project.projectName}\nProject Code: ${project.projectCode}\nClient: ${project.clientName}\nType: ${project.projectType}\nStart Date: ${project.projectStartDate}\nEnd Date: ${project.projectEndDate}\nContract Value: TZS ${project.contractValue}\nManager: ${project.projectManager}\nDescription: ${project.projectDescription}\nDeliverables: ${project.keyDeliverables}\nLocation: ${project.siteLocation}\nPriority: ${project.priorityLevel}\nStatus: ${project.status}\nCreated Date: ${project.createdDate}`,
        project_name: project.projectName, // Required field
        client_name: project.clientName, // Required field
        project_phase: 'planning', // Required field
        priority: project.priorityLevel === 'critical' ? 'High' : project.priorityLevel === 'high' ? 'Medium' : 'Low',
        due_date: project.projectStartDate,
        assigned_to: 'Project Manager',
        submitted_by: 'Project Manager'
    };
    
    // Show loading message
    customAlert('Creating new project...', "Processing", "info");
    
    // Send data to backend API
    const baseUrl = window.location.origin;
    fetch(`${baseUrl}/api/projects`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
            'Authorization': `Bearer ${sessionManager.getAuthToken()}`
        },
        body: JSON.stringify({
            name: project.projectName,
            code: project.projectCode,
            client: project.clientName,
            type: project.projectType,
            location: project.siteLocation,
            startDate: project.projectStartDate,
            endDate: project.projectEndDate,
            budget: project.contractValue,
            manager: project.projectManager,
            description: project.projectDescription,
            keyDeliverables: project.keyDeliverables,
            priority: project.priorityLevel
        })
    })
    .then(response => {
        console.log('📡 Project Creation API Response status:', response.status);
        return response.json();
    })
    .then(data => {
        console.log('📊 Project Creation API Response data:', data);
        
        if (data.error) {
            throw new Error(data.error);
        }
        
        customAlert(`Project created successfully!\n\nProject: ${project.projectName}\nCode: ${project.projectCode}\nContract Value: TZS ${parseInt(project.contractValue).toLocaleString()}\nStatus: ${project.status}\nProject ID: ${data.id}\n\n🎉 Project saved to database!`, "Project Created", "success");
        
        document.getElementById('projectForm').reset();
        
        // Refresh the current view to show new project
        setTimeout(() => {
            createNewProject(); // Reload the Project Manager view
        }, 2000);
    })
    .catch(error => {

    const progressData = {
        progressPercentage: document.getElementById('progressPercentage').value,

        completedMilestones: document.getElementById('completedMilestones').value,

    };
    
    // Show loading
    customAlert('Updating project progress...', "Processing", "info");
    
    // Save to API
    const baseUrl = window.location.origin;
    fetch(`${baseUrl}/api/projects/${projectId}/progress`, {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${sessionManager.getAuthToken()}`
        },
        body: JSON.stringify(progressData)
    })
    .then(response => {
        console.log('📡 Progress update response status:', response.status);
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        return response.json();
    })
    .then(data => {
        console.log('📊 Progress update response:', data);
        
        if (data.success) {
            customAlert(`Project progress updated successfully!\n\nProject: ID ${projectId}\nProgress: ${progressData.progressPercentage}%\nStatus: ${progressData.status}\nUpdated: ${new Date().toLocaleString()}`, "Progress Updated", "success");
            
            // Reset form
            document.getElementById('progressForm').reset();
            document.getElementById('progressUpdateForm').classList.add('hidden');
            
            // Reload projects to show updated progress
            loadProjectsForProgressUpdate();
        } else {
            throw new Error(data.error || 'Failed to update progress');
        }
    })
    .catch(error => {
        console.error('❌ Error updating project progress:', error);
        customAlert(`Error updating project progress: ${error.message}`, "Error", "error");
    });
    
    return false;
}

// Load assigned workers from the database
async function loadAssignedWorkers() {
    try {
        console.log('🔍 Loading assigned workers...');
        
        const token = sessionManager.getAuthToken();
        console.log('🔑 Auth token:', token ? 'Present' : 'Missing');
        console.log('🔑 Token length:', token ? token.length : 0);
        
        // Check if we're having connectivity issues and use fallback immediately
        if (!navigator.onLine) {
            console.log('🌐 Offline mode - using mock data');
            showNotification('Offline mode - using demo data', 'warning', 3000);
            useMockAssignedWorkers();
            return;
        }
        
        const baseUrl = window.location.origin;
        const headers = {
            'Content-Type': 'application/json'
        };
        
        // Add auth header only if token exists
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }
        
        console.log('📡 Making request to:', `${baseUrl}/api/work/assignments`);
        console.log('📡 Request headers:', headers);
        
        // Add timeout to detect connection issues quickly
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000); // 5 second timeout
        
        const response = await fetch(`${baseUrl}/api/work/assignments`, {
            headers: headers,
            signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        console.log('📡 Response status:', response.status);
        console.log('📡 Response OK:', response.ok);
        
        if (!response.ok) {
            const errorText = await response.text();
            console.error('❌ Failed to load assigned workers:', response.status, errorText);
            
            // Handle authentication errors specifically
            if (response.status === 403 || response.status === 401) {
                console.log('🔓 Authentication error - using mock data');
                showNotification('Authentication failed - using demo data', 'warning', 3000);
            } else if (response.status >= 500) {
                console.log('🔧 Server error - using mock data');
                showNotification('Server error - using demo data', 'warning', 3000);
            } else {
                showNotification(`Failed to load assigned workers: ${response.status} ${errorText}`, 'error', 5000);
            }
            
            useMockAssignedWorkers();
            return;
        }
        
        const workers = await response.json();
        console.log('👥 Assigned workers loaded:', workers.length);
        displayAssignedWorkers(workers);
        updateWorkerStats(workers);
        
    } catch (error) {
        console.error('❌ Error loading assigned workers:', error);
        
        // Handle network errors specifically
        if (error.message.includes('Failed to fetch') || error.message.includes('net::ERR_NAME_NOT_RESOLVED') || error.name === 'AbortError') {
            console.log('🌐 Network error - using mock data');
            showNotification('Network connectivity issues - using demo data', 'warning', 3000);
        } else {
            showNotification('Error loading assigned workers: ' + error.message, 'error', 5000);
        }
        
        useMockAssignedWorkers();
    }
}

// Update worker statistics
function updateWorkerStats(workers) {
    const totalWorkers = document.querySelector('.stat-value');
    const activeProjects = new Set(workers.map(w => w.project_id)).size;
    const activeTasks = workers.filter(w => w.status === 'Active').length;
    
    if (totalWorkers) {
        totalWorkers.textContent = workers.length;
    }
    
    // Update other stats if elements exist
    const projectStats = document.querySelectorAll('.stat-value')[1];
    const taskStats = document.querySelectorAll('.stat-value')[2];
    
    if (projectStats) projectStats.textContent = activeProjects;
    if (taskStats) taskStats.textContent = activeTasks;
}

// Real Estate Helper Functions
function saveNewProperty() {
    const property = {
        id: 'PROP-' + Date.now(),
        propertyName: document.getElementById('plotNumber').value,
        propertyType: document.getElementById('propertyType').value,
        location: document.getElementById('propertyLocation').value,
        size: document.getElementById('propertyArea').value,
        value: document.getElementById('propertyPrice').value,
        status: document.getElementById('propertyStatus').value,
        description: document.getElementById('propertyDescription').value,
        owner: document.getElementById('propertyOwner')?.value || '',
        contactInfo: document.getElementById('propertyContact')?.value || ''
    };
    
    // Validate required fields
    if (!property.propertyName || property.propertyName.trim() === '' ||
        !property.propertyType || property.propertyType.trim() === '' ||
        !property.location || property.location.trim() === '' ||
        !property.size || property.size.trim() === '' ||
        !property.value || property.value.trim() === '' ||
        !property.status || property.status.trim() === '') {
        customAlert('Please fill in all required fields:\n\n• Plot Number\n• Property Type\n• Location\n• Area\n• Price\n• Status', "Validation Error", "error");
        return false;
    }
    
    // Prepare work item for Real Estate department
    const workItem = {
        work_type: 'Property Management',
        work_title: `New Property - ${property.propertyName}`,
        work_description: `New Property Added\n\nPlot Number: ${property.propertyName}\nProperty Type: ${property.propertyType}\nLocation: ${property.location}\nArea: ${property.size} sqm\nPrice: TZS ${parseInt(property.value).toLocaleString()}\nStatus: ${property.status}\nDescription: ${property.description}`,
        property_name: property.propertyName, // Required field
        property_type: property.propertyType, // Required field
        client_name: 'Available for Sale', // Required field
        sale_amount: property.value, // Required field
        priority: 'Medium',
        due_date: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], // 30 days from now
        assigned_to: 'Real Estate Manager',
        submitted_by: 'Real Estate Manager'
    };
    
    // Show loading message
    customAlert('Adding new property...', "Processing", "info");
    
    // Send data to backend Properties API
    const baseUrl = window.location.origin;
    console.log('=== DEPLOYMENT VERSION 2.0 - PROPERTIES API CALL ===');
    fetch(`${baseUrl}/api/properties`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
            'Authorization': `Bearer ${sessionManager.getAuthToken()}`
        },
        body: JSON.stringify({
            propertyName: property.propertyName,
            propertyType: property.propertyType,
            location: property.location,
            size: property.size,
            value: property.value,
            status: property.status,
            description: property.description,
            owner: property.owner,
            contactInfo: property.contactInfo
        })
    })
    .then(response => {
        console.log('📡 Property API Response status:', response.status);
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        return response.json();
    })
    .then(data => {
        console.log('📊 Property API Response data:', data);
        
        if (data.error) {
            throw new Error(data.error);
        }
        
        customAlert(`Property added successfully!\n\nPlot: ${property.plotNumber}\nLocation: ${property.location}\nPrice: TZS ${parseInt(property.price).toLocaleString()}\nStatus: ${property.status}\nProperty ID: ${data.id}\n\n🎉 Property saved to database!`, "Property Added", "success");
        
        document.getElementById('propertyForm').reset();
        return false;
    })
    .catch(error => {
        console.error('❌ Error adding property:', error);
        customAlert(`Error adding property: ${error.message}`, "Error", "error");
        return false;
    });
    
    return false;
}

// Load recent documents from database
async function loadRecentDocuments() {
    console.log('🔄 Loading recent documents...');
    
    try {
        const baseUrl = window.location.origin;
        const response = await fetch(`${baseUrl}/api/documents`, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${sessionManager.getAuthToken()}`
            }
        });
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        const documents = data.documents || [];
        console.log('📊 Recent documents:', documents);
        
        const recentUploadsList = document.getElementById('recentUploadsList');
        if (!recentUploadsList) return;
        
        if (documents.length === 0) {
            recentUploadsList.innerHTML = '<div class="no-documents">No documents found</div>';
            return;
        }
        
        // Show only the 5 most recent documents
        const recentDocuments = documents.slice(0, 5);
        
        const documentsHtml = recentDocuments.map(doc => {
            const formatDate = (dateStr) => {
                if (!dateStr) return 'Unknown';
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
            };
            
            const formatFileSize = (size) => {
                if (!size) return 'Unknown size';
                const bytes = parseInt(size);
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            };
            
            const getStatusBadge = (status) => {
                const statusClass = status === 'Approved' ? 'approved' : 
                                   status === 'Pending' ? 'pending' : 
                                   status === 'Draft' ? 'draft' : 'active';
                return `<span class="status-badge ${statusClass}">${status}</span>`;
            };
            
            return `
                <div class="upload-item">
                    <div class="upload-info">
                        <strong>${doc.title}</strong>
                        <p>Type: ${doc.type || doc.category || 'Unknown'} | Department: ${doc.department || doc.category || 'Unknown'}</p>
                        <p>Uploaded: ${formatDate(doc.uploadedDate)} | ${getStatusBadge(doc.status)}</p>
                        ${doc.fileSize ? `<p>Size: ${formatFileSize(doc.fileSize)}</p>` : ''}
                        ${doc.uploadedByName ? `<p>By: ${doc.uploadedByName}</p>` : ''}
                        ${doc.source ? `<p><small>Source: ${doc.source}</small></p>` : ''}
                    </div>
                </div>
            `;
        }).join('');
        
        recentUploadsList.innerHTML = documentsHtml;
        console.log(`✅ Recent documents displayed: ${recentDocuments.length} documents`);
        
    } catch (error) {
        console.error('❌ Error loading recent documents:', error);
        const recentUploadsList = document.getElementById('recentUploadsList');
        if (recentUploadsList) {
            recentUploadsList.innerHTML = '<div class="error">Failed to load documents</div>';
        }
    }
}

function uploadDocument() {
    // Check if DOM is ready
    if (document.readyState === 'loading') {
        console.error('❌ DOM not ready yet, please wait');
        return;
    }
    
    // Check if required elements exist
    const docTypeElement = document.getElementById('docType');
    const docTitleElement = document.getElementById('docTitle');
    const docDepartmentElement = document.getElementById('docDepartment');
    const docDescriptionElement = document.getElementById('docDescription');
    const docFileElement = document.getElementById('docFile');
    const docPriorityElement = document.getElementById('docPriority');
    
    if (!docTypeElement || !docTitleElement || !docDepartmentElement || !docFileElement) {
        console.error('❌ Required DOM elements not found');
        customAlert('Document upload form not ready. Please try again.', "Form Error", "error");
        return;
    }
    
    const docType = docTypeElement.value;
    const docTitle = docTitleElement.value;
    const docDepartment = docDepartmentElement.value;
    const docDescription = docDescriptionElement ? docDescriptionElement.value : '';
    const docFile = docFileElement.files[0];
    const docPriority = docPriorityElement ? docPriorityElement.value : 'medium';
    
    if (!docType || !docTitle || !docDepartment || !docFile) {
        customAlert('Please fill all required fields and select a file:\n\n• Document Type\n• Document Title\n• Department\n• File', "Validation Error", "error");
        return;
    }
    
    const documentData = {
        id: 'DOC-' + Date.now(),
        type: docType,
        title: docTitle,
        department: docDepartment,
        description: docDescription,
        fileName: docFile.name,
        fileSize: docFile.size,
        priority: docPriority,
        uploadedBy: 'Admin Assistant',
        uploadDate: new Date().toISOString(),
        status: 'pending'
    };
    
    // Prepare work item for Admin department
    const workItem = {
        work_type: 'Document Management', // Temporary fix - use existing ENUM value
        work_title: docTitle,
        work_description: docDescription,
        priority: docPriority === 'urgent' ? 'High' : docPriority === 'important' ? 'Medium' : 'Low',
        due_date: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], // 7 days from now
        assigned_to: 'Admin Assistant',
        submitted_by: 'Admin Assistant',
        // Additional document fields
        docType: docType,
        docDepartment: docDepartment,
        docPriority: docPriority,
        docDescription: docDescription,
        docFileName: docFile.name,
        docFileSize: docFile.size
    };
    
    // Show loading message
    customAlert('Uploading document...', "Processing", "info");
    
    // Send data to backend API
    fetch('/api/documents', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
        },
        body: JSON.stringify(workItem)
    })
    .then(response => {
        console.log('📡 Document Upload API Response status:', response.status);
        return response.json();
    })
    .then(data => {
        console.log('📊 Document Upload API Response data:', data);
        
        if (data.error) {
            throw new Error(data.error);
        }
        
        // Show detailed success notification
        showRealProblemNotification('SUCCESS', {
            message: `✅ Document uploaded successfully!\n\n📋 Details:\n• Title: ${docTitle}\n• Type: ${docType}\n• Department: ${docDepartment}\n• File: ${docFile.name}\n• Priority: ${docPriority}\n• Document ID: ${data.id}\n• Status: ${data.status || 'pending'}\n\n🎉 Document saved to database without page refresh!`,
            documentId: data.id,
            fileName: docFile.name,
            uploadDate: new Date().toLocaleString()
        });
        
        // Clear form
        document.getElementById('docType').value = '';
        document.getElementById('docTitle').value = '';
        document.getElementById('docDepartment').value = '';
        document.getElementById('docDescription').value = '';
        document.getElementById('docFile').value = '';
        document.getElementById('docPriority').value = 'normal';
        
        // Refresh the upload list
        uploadDocs();
    })
    .catch(error => {
        console.error('❌ Error uploading document:', error);
        
        // Determine specific error cause
        let errorCause = 'Unknown error occurred';
        let troubleshooting = '';
        
        if (error.message.includes('NetworkError') || error.message.includes('fetch')) {
            errorCause = 'Network connection failed';
            troubleshooting = '• Check internet connection\n• Verify server is running\n• Try again in a moment';
        } else if (error.message.includes('400')) {
            errorCause = 'Invalid request data';
            troubleshooting = '• Fill all required fields\n• Select a valid file\n• Check file size limits';
        } else if (error.message.includes('404')) {
            errorCause = 'API endpoint not found';
            troubleshooting = '• Server routing issue\n• Contact system administrator';
        } else if (error.message.includes('500')) {
            errorCause = 'Server internal error';
            troubleshooting = '• Database connection issue\n• Server configuration problem\n• Contact system administrator';
        } else if (error.message.includes('validation') || error.message.includes('required')) {
            errorCause = 'Form validation failed';
            troubleshooting = '• Fill all required fields\n• Check field formats\n• Ensure file is selected';
        } else if (error.message.includes('database') || error.message.includes('SQL')) {
            errorCause = 'Database operation failed';
            troubleshooting = '• Database connection issue\n• Table might not exist\n• Contact system administrator';
        }
        
        // Show detailed error notification
        showRealProblemNotification('SYSTEM_ERROR', {
            error: error.message,
            cause: errorCause,
            troubleshooting: troubleshooting,
            message: `❌ Document upload failed!\n\n🔍 Error Cause: ${errorCause}\n\n🛠️ Troubleshooting:\n${troubleshooting}\n\n📝 Technical Details:\n${error.message}\n\n💡 Please fix the issue and try again.`,
            fileName: docFile?.name || 'No file selected',
            timestamp: new Date().toLocaleString()
        });
    });
}

function filterDocs() {
    const searchTerm = document.getElementById('docSearchInput').value.toLowerCase();

    docItems.forEach(item => {
        const title = item.querySelector('h5').textContent.toLowerCase();
        const type = item.querySelector('p').textContent.toLowerCase();
        const department = item.querySelectorAll('p')[1].textContent.toLowerCase();
        
        if (title.includes(searchTerm) || type.includes(searchTerm) || department.includes(searchTerm)) {
            item.style.display = 'block';
        } else {
            item.style.display = 'none';
        }
    });

        if (selectedDept === '' || department === selectedDept) {

        } else {
            item.style.display = 'none';
        }
    });
}

function sendNotification() {
    const recipientType = document.getElementById('recipientType').value;
    const recipient = document.getElementById('recipientSelect').value;
    const title = document.getElementById('notifTitle').value;
    const message = document.getElementById('notifMessage').value;
    const priority = document.getElementById('notifPriority').value;
    const scheduleType = document.getElementById('scheduleType').value;
    
    if (!recipientType || !title || !message) {
        alert('Please fill all required fields');
        return;
    }
    
    if ((recipientType === 'department' || recipientType === 'role' || recipientType === 'individual') && !recipient) {
        alert('Please select a recipient');
        return;
    }
    
    const notification = {
        id: 'NOTIF-' + Date.now(),
        recipientType: recipientType,
        recipient: recipient,
        title: title,
        message: message,
        priority: priority,
        scheduleType: scheduleType,
        sentBy: 'Admin Assistant',
        sentDate: new Date().toISOString(),
        status: scheduleType === 'immediate' ? 'sent' : 'scheduled'
    };
    
    // Save to API
    console.log('Notification data to be saved to API:', notification);
    
    // Prepare data for API
    const apiData = {
        title: notification.title,
        message: notification.message,
        type: notification.priority === 'urgent' ? 'error' : notification.priority === 'important' ? 'warning' : 'info',
        category: 'internal'
    };
    
    // Choose API endpoint based on recipient type
    let apiUrl = `${window.location.origin}/api/notifications`;
    
    if (notification.recipientType !== 'individual') {
        // Use broadcast for department, role, and all staff notifications
        apiUrl = `${window.location.origin}/api/notifications/broadcast`;
    } else {
        // For individual notifications, add userId (using recipient as userId for now)
        apiData.userId = notification.recipient;
    }
    
    // Send to API
    fetch(apiUrl, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
            'Authorization': `Bearer ${sessionManager.getAuthToken()}`
        },
        body: JSON.stringify(apiData)
    })
    .then(response => {
        console.log('📡 Notification API Response status:', response.status);
        return response.json();
    })
    .then(data => {
        console.log('📊 Notification API Response data:', data);
        
        if (data.error) {
            throw new Error(data.error);
        }
        
        const recipientText = notification.recipientType === 'all' ? 'All Staff' : notification.recipient;
        const statusText = notification.scheduleType === 'immediate' ? 'sent immediately' : 'scheduled for later';
        
        alert('Notification ' + statusText + '!\n\nTitle: ' + notification.title + '\nTo: ' + recipientText + '\nPriority: ' + notification.priority);
        
        // Clear form
        document.getElementById('recipientType').value = '';
        document.getElementById('recipientSelect').value = '';
        document.getElementById('notifTitle').value = '';
        document.getElementById('notifMessage').value = '';
        document.getElementById('notifPriority').value = 'normal';
        document.getElementById('scheduleType').value = 'immediate';
        document.getElementById('recipientGroup').style.display = 'none';
        document.getElementById('scheduleGroup').style.display = 'none';
    })
    .catch(error => {
        console.error('❌ Error sending notification:', error);
        alert('Failed to send notification: ' + error.message);
    });
    
    // Refresh notifications list
    sendNotifications();
}

function filterEmployeeList() {
    const searchTerm = document.getElementById('employeeSearchInput').value.toLowerCase();
    const departmentFilter = document.getElementById('departmentFilter').value;
    
    // Reload all employees first (try employees first)
    const baseUrl = window.location.origin;
    fetch(`${baseUrl}/api/employees`, {
        method: 'GET',
        headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
            'Authorization': `Bearer ${sessionManager.getAuthToken()}`
        }
    })
    .then(response => response.json())
    .then(data => {
        let employees = Array.isArray(data) ? data : (data && typeof data === 'object' ? [data] : []);
        
        // Apply filters
        if (searchTerm || departmentFilter) {
            employees = employees.filter(employee => {
                // Handle field mapping for both tables
                const fullName = employee.fullName || employee.full_name || employee.name || '';
                const department = employee.department || employee.department_name || '';
                const position = employee.position || employee.job_title || '';
                
                const matchesSearch = !searchTerm || 
                    fullName.toLowerCase().includes(searchTerm) ||
                    department.toLowerCase().includes(searchTerm) ||
                    position.toLowerCase().includes(searchTerm);
                
                // Enhanced department matching - handle various formats
                let matchesDepartment = !departmentFilter;
                if (departmentFilter && department) {
                    const deptLower = department.toLowerCase();
                    const filterLower = departmentFilter.toLowerCase();
                    
                    // Direct match
                    matchesDepartment = deptLower === filterLower ||
                                       // Match without spaces/special chars
                                       deptLower.replace(/\s+/g, '') === filterLower ||
                                       // Partial match for safety
                                       deptLower.includes(filterLower) ||
                                       filterLower.includes(deptLower.replace(/\s+/g, ''));
                }
                
                return matchesSearch && matchesDepartment;
            });
        }
        
        displayEmployeeList(employees);
        updateEmployeeStats(employees);
    })
    .catch(error => {
        console.error('❌ Error filtering employees:', error);
        // Fallback to employees table
        fetch(`${baseUrl}/api/employees`, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json',
                'Authorization': `Bearer ${sessionManager.getAuthToken()}`
            }
        })
        .then(response => response.json())
        .then(data => {
            let employees = Array.isArray(data) ? data : (data && typeof data === 'object' ? [data] : []);
            
            // Apply filters
            if (searchTerm || departmentFilter) {
                employees = employees.filter(employee => {
                    const fullName = employee.fullName || employee.full_name || employee.name || '';
                    const department = employee.department || employee.department_name || '';
                    const position = employee.position || employee.job_title || '';
                    
                    const matchesSearch = !searchTerm || 
                        fullName.toLowerCase().includes(searchTerm) ||
                        department.toLowerCase().includes(searchTerm) ||
                        position.toLowerCase().includes(searchTerm);
                    
                    // Enhanced department matching - handle various formats
                    let matchesDepartment = !departmentFilter;
                    if (departmentFilter && department) {
                        const deptLower = department.toLowerCase();
                        const filterLower = departmentFilter.toLowerCase();
                        
                        // Direct match
                        matchesDepartment = deptLower === filterLower ||
                                           // Match without spaces/special chars
                                           deptLower.replace(/\s+/g, '') === filterLower ||
                                           // Partial match for safety
                                           deptLower.includes(filterLower) ||
                                           filterLower.includes(deptLower.replace(/\s+/g, ''));
                    }
                    
                    return matchesSearch && matchesDepartment;
                });
            }
            
            displayEmployeeList(employees);
            updateEmployeeStats(employees);
        })
        .catch(fallbackError => {
            console.error('❌ Fallback filter also failed:', fallbackError);
        });
    });
}

// Add debouncing to prevent infinite loops
let backButtonTimeout = null;

function goBack() {
    // Clear any existing timeout
    if (backButtonTimeout) {
        clearTimeout(backButtonTimeout);
    }
    
    // Set new timeout to prevent rapid multiple calls
    backButtonTimeout = setTimeout(() => {
        console.log('🔙 Going back...');
        
        // Try to go back in browser history
        if (window.history.length > 1) {
            window.history.back();
        } else {
            // If no history, go back to main menu
            console.log('🏠 No history available, returning to main menu');
            showContent(`
                <div class="card">
                    <h3>🏠 Main Menu</h3>
                    <p>Welcome back to the main menu. Select an option from the navigation menu.</p>

                        <button class="action" onclick="officePortal()">🏢 Office Portal</button>
                        <button class="action" onclick="showContent('')">📋 Dashboard</button>

                </div>
            `);
        }
        
        // Clear timeout after execution
        backButtonTimeout = null;
    }, 100); // 100ms debounce
}
