<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Upload Function</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin: 10px 0; }
        label { display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 8px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #0b3d91; color: white; border: none; cursor: pointer; }
        button:hover { background: #0a2c7a; }
        .result { margin-top: 20px; padding: 10px; background: #f0f0f0; }
    </style>
</head>
<body>
    <h1>Test Certificate Upload Function</h1>
    
    <div class="form-group">
        <label>Certificate Type</label>
        <select id="certType">
            <option value="">Select Type</option>
            <option value="tin">TIN Certificate</option>
            <option value="vrn">VRN Certificate</option>
            <option value="crb">CRB Certificate</option>
            <option value="license">Business License</option>
        </select>
    </div>

    <div class="form-group">
        <label>Document File</label>
        <input type="file" id="certFile" accept=".pdf,.jpg,.jpeg,.png" />
    </div>

    <div class="form-group">
        <label>Expiry Date</label>
        <input type="date" id="certExpiry" />
    </div>

    <div class="form-group">
        <label>Description</label>
        <textarea id="certDescription" rows="3"></textarea>
    </div>

    <button onclick="testUploadCertificate()">Test Upload Function</button>
    <button onclick="checkFunctionExists()">Check if Function Exists</button>

    <div id="result" class="result"></div>

    <script>
        // Mock the uploadCertificate function for testing
        async function uploadCertificate() {
            console.log('🚀 uploadCertificate function called');
            
            const certType = document.getElementById('certType').value;
            const certFile = document.getElementById('certFile').files[0];
            const certExpiry = document.getElementById('certExpiry').value;
            const certDescription = document.getElementById('certDescription').value;

            console.log('📋 Form values:', {
                certType,
                certFile: certFile ? certFile.name : 'No file selected',
                certExpiry,
                certDescription
            });

            // Validation
            if (!certType) {
                showResult('❌ Please select a certificate type', 'error');
                return;
            }

            if (!certFile) {
                showResult('❌ Please select a file to upload', 'error');
                return;
            }

            if (!certExpiry) {
                showResult('❌ Please enter an expiry date', 'error');
                return;
            }

            // Simulate upload process
            showResult('⏳ Uploading certificate...', 'info');
            
            try {
                // Simulate API call
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                showResult('✅ Certificate uploaded successfully! (This is a test simulation)', 'success');
                
                // Clear form
                document.getElementById('certType').value = '';
                document.getElementById('certFile').value = '';
                document.getElementById('certExpiry').value = '';
                document.getElementById('certDescription').value = '';
                
            } catch (error) {
                showResult('❌ Upload failed: ' + error.message, 'error');
            }
        }

        function testUploadCertificate() {
            console.log('🧪 Testing uploadCertificate function...');
            try {
                if (typeof uploadCertificate === 'function') {
                    console.log('✅ uploadCertificate function exists, calling it now...');
                    uploadCertificate();
                } else {
                    console.error('❌ uploadCertificate function not found');
                    showResult('❌ uploadCertificate function not found!', 'error');
                }
            } catch (error) {
                console.error('❌ Error testing uploadCertificate:', error);
                showResult('❌ Error testing uploadCertificate: ' + error.message, 'error');
            }
        }

        function checkFunctionExists() {
            const exists = typeof uploadCertificate === 'function';
            showResult(exists ? '✅ uploadCertificate function exists and is callable' : '❌ uploadCertificate function not found', exists ? 'success' : 'error');
        }

        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `<strong>${message}</strong>`;
            resultDiv.style.background = type === 'error' ? '#ffebee' : type === 'success' ? '#e8f5e8' : '#fff3cd';
            resultDiv.style.color = type === 'error' ? '#c62828' : type === 'success' ? '#2e7d32' : '#f57c00';
        }
    </script>
</body>
</html>
