[build]

builder = "NIXPACKS"



[deploy]
# FORCE REDEPLOY - MATERIALS TRACK NUMBER FIX v2.0.2
startCommand = "npm start"

restartPolicyType = "ON_FAILURE"

restartPolicyMaxRetries = 3

healthcheckPath = "/api/health"

healthcheckTimeout = 30

healthcheckInterval = 15

healthcheckRetries = 3



[[services]]

name = "kashtec-web"

source = "kashtec-construction-system"



[services.ports]

[services.ports.http]

port = 8080

handler = "http"



[env]

NODE_ENV = "production"

PORT = "${PORT:-8080}"



# MySQL Database Configuration (Using Railway Automatic Variables)

# Railway provides these with MySQL. prefix:
DATABASE_URL = "${MySQL.MYSQL_URL}"

MYSQL_PUBLIC_URL = "${MySQL.MYSQL_PUBLIC_URL}"

MYSQL_URL = "${MySQL.MYSQL_URL}"

MYSQLUSER = "${MySQL.MYSQLUSER}"

MYSQLPASSWORD = "${MySQL.MYSQLPASSWORD}"

MYSQLDATABASE = "${MySQL.MYSQLDATABASE}"

MYSQLPORT = "${MySQL.MYSQLPORT}"

MYSQLHOST = "${MySQL.MYSQLHOST}"

RAILWAY_PRIVATE_DOMAIN = "${MySQL.MYSQLHOST}"

RAILWAY_TCP_PROXY_DOMAIN = "${MySQL.RAILWAY_TCP_PROXY_DOMAIN}"

RAILWAY_TCP_PROXY_PORT = "${MySQL.RAILWAY_TCP_PROXY_PORT}"



# Legacy Database Variables (for compatibility)

DB_HOST = "${MySQL.MYSQLHOST}"

DB_USER = "${MySQL.MYSQLUSER}"

DB_PASSWORD = "${MySQL.MYSQLPASSWORD}"

DB_NAME = "${MySQL.MYSQLDATABASE}"

DB_PORT = "${MySQL.MYSQLPORT}"



# Security Configuration

JWT_SECRET = "${JWT_SECRET:-kashtec-secret-key-2024}"

GITHUB_TOKEN = "${GITHUB_TOKEN}"

BCRYPT_ROUNDS = "12"

JWT_EXPIRE = "7d"

CORS_ORIGIN = "${CORS_ORIGIN:-*}"



# File Upload Configuration

MAX_FILE_SIZE = "10485760"

UPLOAD_PATH = "./uploads"



# Notification Configuration

ENABLE_EMAIL_NOTIFICATIONS = "false"

SMTP_HOST = "${SMTP_HOST}"

SMTP_PORT = "${SMTP_PORT:-587}"

SMTP_USER = "${SMTP_USER}"

SMTP_PASS = "${SMTP_PASS}"



# GitHub Integration

GITHUB_REPO = "${GITHUB_REPO}"

GITHUB_BRANCH = "${GITHUB_BRANCH:-main}"

AUTO_PUSH_ENABLED = "${AUTO_PUSH_ENABLED:-true}"

