[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/"
healthcheckTimeout = 30
healthcheckInterval = 15
healthcheckRetries = 10

[[services]]
name = "khashtec-construction-system"
source = "."

[services.ports]
[services.ports.http]
port = 3000
handler = "http"

[env]
NODE_ENV = "production"
PORT = "${PORT:-3000}"
