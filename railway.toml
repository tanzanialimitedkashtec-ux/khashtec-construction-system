[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run test-connection && npm run migrate && npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/api/health"
healthcheckTimeout = 30
healthcheckInterval = 60
healthcheckRetries = 3

[[services]]
name = "kashtec-web"
source = "kashtec-construction-system"

[services.ports]
[services.ports.http]
port = 3000
handler = "http"

[env]
NODE_ENV = "production"
PORT = "${PORT:-3000}"
DATABASE_URL = "mysql://root:LzDEYGJIiYfVRSTnBrufpsSwRIDnZRvz@centerbeam.proxy.rlwy.net:11044/railway"
JWT_SECRET = "${JWT_SECRET:-kashtec-secret-key-2024}"
GITHUB_TOKEN = "${GITHUB_TOKEN}"

# Database Configuration (Direct Connection)
DB_HOST = "centerbeam.proxy.rlwy.net"
DB_USER = "root"
DB_PASSWORD = "LzDEYGJIiYfVRSTnBrufpsSwRIDnZRvz"
DB_NAME = "railway"
DB_PORT = "11044"

# Application Configuration
APP_NAME = "KASHTEC Construction Management System"
APP_VERSION = "1.0.0"
APP_URL = "https://${RAILWAY_PUBLIC_DOMAIN}"

# Security Configuration
BCRYPT_ROUNDS = "12"
JWT_EXPIRE = "7d"
CORS_ORIGIN = "${CORS_ORIGIN:-*}"

# File Upload Configuration
MAX_FILE_SIZE = "10485760"
UPLOAD_PATH = "./uploads"

# Notification Configuration
ENABLE_EMAIL_NOTIFICATIONS = "false"
SMTP_HOST = "${SMTP_HOST}"
SMTP_PORT = "${SMTP_PORT:-587}"
SMTP_USER = "${SMTP_USER}"
SMTP_PASS = "${SMTP_PASS}"

# GitHub Integration
GITHUB_REPO = "${GITHUB_REPO}"
GITHUB_BRANCH = "${GITHUB_BRANCH:-main}"
AUTO_PUSH_ENABLED = "${AUTO_PUSH_ENABLED:-true}"
