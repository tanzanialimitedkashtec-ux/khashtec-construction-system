[build]

builder = "NIXPACKS"



[deploy]

startCommand = "npm run migrate && node simple-server.js"

restartPolicyType = "ON_FAILURE"

restartPolicyMaxRetries = 3

healthcheckPath = "/"

healthcheckTimeout = 30

healthcheckInterval = 15

healthcheckRetries = 3



[[services]]

name = "kashtec-web"

source = "kashtec-construction-system"



[services.ports]

[services.ports.http]

port = 3000

handler = "http"



[env]

NODE_ENV = "production"

PORT = "${PORT:-3000}"



# MySQL Database Configuration (Railway Variables)

MYSQL_DATABASE = "railway"

MYSQL_ROOT_PASSWORD = "LzDEYGJIiYfVRSTnBrufpsSwRIDnZRvz"

MYSQLUSER = "root"

RAILWAY_TCP_PROXY_DOMAIN = "${RAILWAY_TCP_PROXY_DOMAIN}"

RAILWAY_TCP_PROXY_PORT = "${RAILWAY_TCP_PROXY_PORT}"

RAILWAY_PRIVATE_DOMAIN = "${RAILWAY_PRIVATE_DOMAIN}"



# Database URL (Using Railway Variables)

DATABASE_URL = "mysql://${MYSQLUSER}:${MYSQL_ROOT_PASSWORD}@${RAILWAY_TCP_PROXY_DOMAIN}:${RAILWAY_TCP_PROXY_PORT}/${MYSQL_DATABASE}"

PUBLIC_URL = "mysql://${MYSQLUSER}:${MYSQL_ROOT_PASSWORD}@${RAILWAY_TCP_PROXY_DOMAIN}:${RAILWAY_TCP_PROXY_PORT}/${MYSQL_DATABASE}"

MYSQL_URL = "mysql://${MYSQLUSER}:${MYSQL_ROOT_PASSWORD}@${RAILWAY_PRIVATE_DOMAIN}:3306/${MYSQL_DATABASE}"



# Legacy Database Variables (for compatibility)

DB_HOST = "${RAILWAY_PRIVATE_DOMAIN}"

DB_USER = "${MYSQLUSER}"

DB_PASSWORD = "${MYSQL_ROOT_PASSWORD}"

DB_NAME = "${MYSQL_DATABASE}"

DB_PORT = "${RAILWAY_TCP_PROXY_PORT}"



# Security Configuration

JWT_SECRET = "${JWT_SECRET:-kashtec-secret-key-2024}"

GITHUB_TOKEN = "${GITHUB_TOKEN}"

BCRYPT_ROUNDS = "12"

JWT_EXPIRE = "7d"

CORS_ORIGIN = "${CORS_ORIGIN:-*}"



# File Upload Configuration

MAX_FILE_SIZE = "10485760"

UPLOAD_PATH = "./uploads"



# Notification Configuration

ENABLE_EMAIL_NOTIFICATIONS = "false"

SMTP_HOST = "${SMTP_HOST}"

SMTP_PORT = "${SMTP_PORT:-587}"

SMTP_USER = "${SMTP_USER}"

SMTP_PASS = "${SMTP_PASS}"



# GitHub Integration

GITHUB_REPO = "${GITHUB_REPO}"

GITHUB_BRANCH = "${GITHUB_BRANCH:-main}"

AUTO_PUSH_ENABLED = "${AUTO_PUSH_ENABLED:-true}"

