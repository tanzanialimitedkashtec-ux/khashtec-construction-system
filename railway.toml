[build]

builder = "NIXPACKS"



[deploy]
# FORCE REDEPLOY - PROPERTIES FIX v2.0.1
startCommand = "npm start"

restartPolicyType = "ON_FAILURE"

restartPolicyMaxRetries = 3

healthcheckPath = "/api/health"

healthcheckTimeout = 30

healthcheckInterval = 15

healthcheckRetries = 3



[[services]]

name = "kashtec-web"

source = "kashtec-construction-system"



[services.ports]

[services.ports.http]

port = 8080

handler = "http"



[env]

NODE_ENV = "production"

PORT = "${PORT:-8080}"



# MySQL Database Configuration (Using Railway Automatic Variables)

# Railway provides these automatically with double braces:
# DATABASE_URL, MYSQL_PUBLIC_URL, MYSQLUSER, MYSQLPASSWORD, MYSQLDATABASE, etc.

DATABASE_URL = "${{DATABASE_URL}}"

MYSQL_PUBLIC_URL = "${{MYSQL_PUBLIC_URL}}"

MYSQL_URL = "${{MYSQL_URL}}"

MYSQLUSER = "${{MYSQLUSER}}"

MYSQLPASSWORD = "${{MYSQL_ROOT_PASSWORD}}"

MYSQLDATABASE = "${{MYSQL_DATABASE}}"

MYSQLPORT = "${{MYSQLPORT}}"

MYSQL_ROOT_PASSWORD = "${{MYSQL_ROOT_PASSWORD}}"

RAILWAY_PRIVATE_DOMAIN = "${{RAILWAY_PRIVATE_DOMAIN}}"

RAILWAY_TCP_PROXY_DOMAIN = "${{RAILWAY_TCP_PROXY_DOMAIN}}"

RAILWAY_TCP_PROXY_PORT = "${{RAILWAY_TCP_PROXY_PORT}}"



# Legacy Database Variables (for compatibility)

DB_HOST = "${RAILWAY_PRIVATE_DOMAIN}"

DB_USER = "${MYSQLUSER}"

DB_PASSWORD = "${MYSQLPASSWORD}"

DB_NAME = "${MYSQLDATABASE}"

DB_PORT = "${MYSQLPORT}"



# Security Configuration

JWT_SECRET = "${JWT_SECRET:-kashtec-secret-key-2024}"

GITHUB_TOKEN = "${GITHUB_TOKEN}"

BCRYPT_ROUNDS = "12"

JWT_EXPIRE = "7d"

CORS_ORIGIN = "${CORS_ORIGIN:-*}"



# File Upload Configuration

MAX_FILE_SIZE = "10485760"

UPLOAD_PATH = "./uploads"



# Notification Configuration

ENABLE_EMAIL_NOTIFICATIONS = "false"

SMTP_HOST = "${SMTP_HOST}"

SMTP_PORT = "${SMTP_PORT:-587}"

SMTP_USER = "${SMTP_USER}"

SMTP_PASS = "${SMTP_PASS}"



# GitHub Integration

GITHUB_REPO = "${GITHUB_REPO}"

GITHUB_BRANCH = "${GITHUB_BRANCH:-main}"

AUTO_PUSH_ENABLED = "${AUTO_PUSH_ENABLED:-true}"

