<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>KASHTEC Construction Management System</title>
    
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="header-container">
        <h2>KASHTEC Construction Management System</h2>
        <div id="notificationContainer" class="notification-icon hidden" onclick="toggleNotificationPanel()">
            <span class="bell-icon">🔔</span>
            <span id="notificationBadge" class="notification-badge hidden">0</span>
        </div>
    </div>
</header>

<div id="loginPage" class="login-box">
    <h3>Login</h3>
    <form id="loginForm" onsubmit="return handleLogin()">
        <input type="email" id="loginEmail" placeholder="Enter your email" required>
        <select id="loginRole" onchange="updatePasswordPlaceholder()" title="Select your role" required>
            <option value="">Select Role</option>
            <option value="MD">Managing Director</option>
            <option value="ADMIN">Director of Administration</option>
            <option value="HR">HR Manager</option>
            <option value="HSE">HSE Manager</option>
            <option value="FINANCE">Finance Manager</option>
            <option value="PROJECT">Project Manager</option>
            <option value="REALESTATE">Real Estate Manager</option>
            <option value="ASSISTANT">Admin Assistant</option>
        </select>
        <input type="password" id="loginPassword" placeholder="Enter password" required>
        <button type="submit" id="loginBtn" class="action">Login</button>
    </form>
    
    </div>

<div id="systemPage" class="container hidden">

    
    <div class="sidebar">
        <h3 id="userRole"></h3>
        <div id="menu"></div>
        <button onclick="handleLogout()">Logout</button>
    </div>

    <div class="content" id="contentArea">
        <h3>Welcome</h3>
    </div>

    
</div>

<!-- Link to external JavaScript -->
<script src="js/script.js"></script>
<script src="js/sessionManager.js"></script>
<script src="js/database-api.js"></script>
<script src="assets/js/api.js"></script>

<script>
    function loadMenu(){
        const menu = document.getElementById("menu");
        menu.innerHTML = "";
        
        console.log('Loading unified menu for role:', currentRole); // Debug line

        // Define all possible menu items with their access roles
        const allMenuItems = [
            { name: "Register Employee", func: registerEmployee, roles: ["HR"] },
            { name: "Create Worker Account", func: createWorkerAccount, roles: ["HR"] },
            { name: "Assign Project Workers", func: assignWorker, roles: ["HR", "PROJECT"] },
            { name: "Update Employee Records", func: updateEmployeeRecords, roles: ["HR"] },
            { name: "Track Attendance", func: attendance, roles: ["HR"] },
            { name: "Manage Leave & Contracts", func: manageLeaveContracts, roles: ["HR"] },
            { name: "Manage Policies", func: loadPolicies, roles: ["HR", "ADMIN"] },
            { name: "Approve Senior Staff Hiring", func: loadSeniorHiringRequests, roles: ["HR", "MD"] },
            { name: "Approve Workforce Budget", func: loadWorkforceBudgets, roles: ["HR", "MD", "FINANCE"] },
            
            // HSE Menu Items
            { name: "Record Incident Reports", func: recordIncidentReports, roles: ["HSE"] },
            { name: "Upload Safety Policies", func: uploadSafetyPolicies, roles: ["HSE"] },
            { name: "Record Toolbox Meetings", func: recordToolboxMeetings, roles: ["HSE"] },
            { name: "Track PPE Issuance", func: trackPpeIssuance, roles: ["HSE"] },
            { name: "Mark Safety Violations", func: markSafetyViolations, roles: ["HSE"] },
            { name: "Upload Inspection Reports", func: uploadInspectionReports, roles: ["HSE"] },
            { name: "View Project Safety Status", func: viewProjectSafetyStatus, roles: ["HSE", "PROJECT"] },
            
            // MD Menu Items
            { name: "Approve Recruitment Policies", func: approveRecruitmentPolicies, roles: ["MD"] },
            { name: "Approve Senior Staff Hiring", func: approveSeniorHiring, roles: ["MD"] },
            { name: "Approve Workforce Budget", func: showWorkforceBudgetApproval, roles: ["MD", "FINANCE"] },
            { name: "Review Employee Count", func: reviewEmployeeCount, roles: ["MD"] },
            { name: "View All Workers", func: viewAllWorkers, roles: ["MD", "HR", "ADMIN"] },
            { name: "Suspend/Terminate Employment", func: suspendTerminateEmployment, roles: ["MD", "HR"] },
            { name: "View Workforce Reports", func: viewWorkforceReports, roles: ["MD", "HR", "FINANCE"] },
            
            // ADMIN Menu Items
            { name: "Administrative Operations", func: adminOperations, roles: ["ADMIN"] },
            { name: "Compliance Management", func: complianceManagement, roles: ["ADMIN", "MD"] },
            { name: "Staff Oversight", func: staffOversight, roles: ["ADMIN"] },
            { name: "Policy Implementation", func: policyImplementation, roles: ["ADMIN"] },
            { name: "Document Management", func: documentManagement, roles: ["ADMIN", "ASSISTANT"] },
            { name: "User Account Management", func: userAccountManagement, roles: ["ADMIN"] },
            
            // FINANCE Menu Items
            { name: "Budgeting", func: financeBudgeting, roles: ["FINANCE", "MD"] },
            { name: "Financial Management", func: financialManagement, roles: ["FINANCE"] },
            { name: "Payroll Processing", func: payrollProcessing, roles: ["FINANCE", "HR"] },
            { name: "Expense Control", func: expenseControl, roles: ["FINANCE"] },
            { name: "Financial Reporting", func: financialReporting, roles: ["FINANCE", "MD"] },
            { name: "Audits", func: financeAudits, roles: ["FINANCE", "ADMIN"] },
            { name: "Compliance", func: financeCompliance, roles: ["FINANCE", "ADMIN"] },
            
            // PROJECT Menu Items
            { name: "Create New Project", func: createNewProject, roles: ["PROJECT", "MD"] },
            { name: "Update Project Progress", func: updateProjectProgress, roles: ["PROJECT"] },
            { name: "Assign Tasks", func: assignTasks, roles: ["PROJECT"] },
            { name: "Request Workforce", func: requestWorkforce, roles: ["PROJECT", "HR"] },
            { name: "View Assigned Workers", func: viewAssignedWorkers, roles: ["PROJECT", "HR"] },
            { name: "Record Site Reports", func: recordSiteReports, roles: ["PROJECT"] },
            { name: "Approve Completed Work", func: approveCompletedWork, roles: ["PROJECT"] },
            
            // REALESTATE Menu Items
            { name: "Add Property", func: addProperty, roles: ["REALESTATE"] },
            { name: "Edit Property Details", func: editPropertyDetails, roles: ["REALESTATE"] },
            { name: "Register Client", func: registerClient, roles: ["REALESTATE"] },
            { name: "Record Sale", func: recordSale, roles: ["REALESTATE"] },
            { name: "Track Payment Progress", func: trackPaymentProgress, roles: ["REALESTATE", "FINANCE"] },
            { name: "Generate Sales Report", func: generateSalesReport, roles: ["REALESTATE", "FINANCE"] },
            
            // ASSISTANT Menu Items
            { name: "Upload Documents", func: uploadDocs, roles: ["ASSISTANT", "ADMIN"] },
            { name: "Edit Documents", func: editDocuments, roles: ["ASSISTANT", "ADMIN"] },
            { name: "Schedule Meetings", func: scheduleMeeting, roles: ["ASSISTANT", "ADMIN"] },
            { name: "Send Notifications", func: sendNotifications, roles: ["ASSISTANT", "ADMIN", "HR"] },
            { name: "Record Meeting Minutes", func: recordMeetingMinutes, roles: ["ASSISTANT", "ADMIN"] },
            { name: "View Employee List", func: viewEmployeeList, roles: ["ASSISTANT", "HR", "ADMIN"] },
            { name: "Office Portal", func: officePortal, roles: ["ASSISTANT", "ADMIN"] }
        ];

        // Create menu items based on role access
        allMenuItems.forEach(item => {
            const hasAccess = item.roles.includes(currentRole);
            addUnifiedMenuItem(item.name, item.func, hasAccess);
        });

        console.log('Unified menu loaded. Total items:', menu.children.length); // Debug line
    }

    function addUnifiedMenuItem(name, func, hasAccess) {
        try {
            const btn = document.createElement("button");
            btn.innerText = name;
            
            if (hasAccess) {
                // User has access - normal button
                btn.onclick = func;
                btn.className = 'menu-item accessible';
                btn.title = `Access granted for ${currentRole}`;
            } else {
                // User doesn't have access - shadow/disabled state
                btn.onclick = function() {
                    alert(`Access Denied: This feature is only available for authorized roles.\n\nCurrent Role: ${currentRole}\nFeature: ${name}`);
                };
                btn.className = 'menu-item restricted';
                btn.title = `Access denied for ${currentRole} - This feature requires authorization`;
                btn.disabled = true;
            }
            
            document.getElementById("menu").appendChild(btn);
            console.log('Added menu item:', name, 'Access:', hasAccess ? 'Granted' : 'Denied'); // Debug line
        } catch (error) {
            console.error('Error adding menu item:', name, error);
        }
    }
</script>

</body>
</html>
